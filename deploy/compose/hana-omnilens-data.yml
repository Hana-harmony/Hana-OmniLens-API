name: hana-omnilens-data

services:
  postgres:
    image: postgres:17.10-bookworm@sha256:4f736ae292687621d4dbe0d499ffd024a36bd2ee7d8ca6f2ccd4c800f047b394
    container_name: hana-omnilens-postgres
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 2g
    cpus: 0.75
    shm_size: 256m
    environment:
      POSTGRES_DB: omnilens
      POSTGRES_USER: omnilens_app
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-password
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --data-checksums
    command:
      - postgres
      - -c
      - password_encryption=scram-sha-256
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - max_connections=100
      - -c
      - log_min_duration_statement=1000
    secrets:
      - source: postgres-password
        target: postgres-password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
      - /var/run/postgresql:rw,noexec,nosuid,size=16m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnilens_app -d omnilens"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"

  redis:
    image: redis:8.2.7-bookworm@sha256:2c40d53886e2d7a4bceaa69605a22e7943d8a83d776183a36c9ebaed9d55f7e7
    container_name: hana-omnilens-redis
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 1g
    cpus: 0.25
    command:
      - redis-server
      - --aclfile
      - /run/secrets/redis-users.acl
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "900 1"
      - --save
      - "300 10"
      - --maxmemory
      - 768mb
      - --maxmemory-policy
      - noeviction
    secrets:
      - source: redis-users-acl
        target: redis-users.acl
    volumes:
      - redis-data:/data
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          password=$$(sed -n 's/^user omnilens_app .* >\([^ ]*\).*/\1/p' /run/secrets/redis-users.acl);
          REDISCLI_AUTH="$$password" redis-cli --user omnilens_app ping | grep -qx PONG
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"

secrets:
  postgres-password:
    file: ./postgres-password
  redis-users-acl:
    file: ./redis-users.acl

volumes:
  postgres-data:
    name: hana-omnilens-postgres-data
  redis-data:
    name: hana-omnilens-redis-data

networks:
  internal:
    name: hana-omnilens-internal
    driver: bridge
