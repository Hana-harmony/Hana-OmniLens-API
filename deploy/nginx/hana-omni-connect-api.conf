limit_req_zone $binary_remote_addr zone=omni_connect_api:10m rate=10r/s;
map $http_upgrade $omni_connect_connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name api.hanaomni.cloud;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 308 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name api.hanaomni.cloud;

    ssl_certificate /etc/letsencrypt/live/api.hanaomni.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.hanaomni.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    client_max_body_size 12m;

    location = /actuator/prometheus { return 404; }
    location = /grafana { return 308 /grafana/; }

    location /grafana/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $omni_connect_connection_upgrade;
        proxy_connect_timeout 3s;
        proxy_read_timeout 75s;
        proxy_pass http://127.0.0.1:3300;
    }

    location / {
        limit_req zone=omni_connect_api burst=40 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $omni_connect_connection_upgrade;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30m;
        proxy_pass http://hana_omni_connect_api;
    }
}
