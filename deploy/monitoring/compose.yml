name: hana-omni-connect-observability

services:
  prometheus:
    image: prom/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    read_only: true
    user: "65534:65534"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=8GB
      - --web.enable-lifecycle
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    networks: [monitoring, app]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]

  loki:
    image: grafana/loki:3.7.0@sha256:c316b7c7589a5eeca843b6926c7446149d18300b79ac8538dc4ae063bc478da2
    restart: unless-stopped
    mem_limit: 1g
    cpus: 0.75
    read_only: true
    user: "10001:10001"
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    networks: [monitoring]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]

  alloy:
    image: grafana/alloy:v1.16.1@sha256:51aeb9d829239345070619dad3edd6873186f913c84f45b365b74574fcb38ec0
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25
    read_only: true
    user: "0:0"
    command: run --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    networks: [monitoring]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [DAC_OVERRIDE]
    depends_on: [loki]

  node-exporter:
    image: prom/node-exporter:v1.11.1@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.15
    read_only: true
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    pid: host
    volumes:
      - /:/host:ro
    networks: [monitoring]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.28.0@sha256:e753ff9f3fc458d02cca5eddab5a77e1c175eee484a8925ac7d524f04366c2fc
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.15
    read_only: true
    command: --config.file=/etc/blackbox/blackbox.yml
    volumes:
      - ./blackbox.yml:/etc/blackbox/blackbox.yml:ro
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    networks: [monitoring]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]

  grafana:
    image: grafana/grafana:13.0.2@sha256:5dad0df181cb644a14e13617b913b261a54f7d4fd4510721dba420929f35bea2
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    read_only: true
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_COOKIE_SECURE: "false"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_PLUGINS_PREINSTALL_SYNC: ""
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
      OMNI_CONNECT_DISCORD_WEBHOOK_URL: ${OMNI_CONNECT_DISCORD_WEBHOOK_URL:?required}
      HANNAH_DISCORD_WEBHOOK_URL: ${HANNAH_DISCORD_WEBHOOK_URL:?required}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    ports:
      - 127.0.0.1:${GRAFANA_HOST_PORT:-3300}:3000
    networks: [monitoring]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    depends_on: [prometheus, loki]

networks:
  monitoring:
  app:
    name: hana-omni-connect-internal
    external: true

volumes:
  prometheus-data:
  loki-data:
  alloy-data:
  grafana-data:
