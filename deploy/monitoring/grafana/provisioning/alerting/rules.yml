apiVersion: 1

groups:
  - orgId: 1
    name: omni-connect-production
    folder: Production
    interval: 1m
    rules:
      - uid: omni-connect-api-down
        title: OmniConnect API unavailable
        condition: B
        data:
          - refId: A
            relativeTimeRange: {from: 180, to: 0}
            datasourceUid: prometheus
            model: {expr: 'up{job="hana-omni-connect-api"}', instant: true, refId: A}
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              conditions: [{evaluator: {params: [1], type: lt}, operator: {type: and}, query: {params: [B]}, reducer: {params: [], type: last}, type: query}]
              refId: B
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations: {summary: "OmniConnect API metrics endpoint is unavailable"}
        labels: {service: omni-connect, severity: critical}

      - uid: omni-connect-api-errors
        title: OmniConnect API error logs detected
        condition: B
        data:
          - refId: A
            relativeTimeRange: {from: 360, to: 0}
            datasourceUid: prometheus
            model: {expr: 'sum(increase(logback_events_total{application="hana-omni-connect-api",level="error"}[5m]))', instant: true, refId: A}
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              conditions: [{evaluator: {params: [2], type: gt}, operator: {type: and}, query: {params: [B]}, reducer: {params: [], type: last}, type: query}]
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations: {summary: "OmniConnect API emitted at least three ERROR logs in five minutes"}
        labels: {service: omni-connect, severity: warning}

      - uid: omni-connect-public-down
        title: OmniConnect public HTTPS unavailable
        condition: B
        data:
          - refId: A
            relativeTimeRange: {from: 180, to: 0}
            datasourceUid: prometheus
            model: {expr: 'min(probe_success{job="blackbox-https"})', instant: true, refId: A}
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              conditions: [{evaluator: {params: [1], type: lt}, operator: {type: and}, query: {params: [B]}, reducer: {params: [], type: last}, type: query}]
              refId: B
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations: {summary: "OmniConnect frontend or API HTTPS probe failed"}
        labels: {service: omni-connect, severity: critical}

      - uid: hannah-ai-down
        title: Hannah Montana AI unavailable
        condition: B
        data:
          - refId: A
            relativeTimeRange: {from: 180, to: 0}
            datasourceUid: prometheus
            model: {expr: 'up{job="hannah-montana-ai"}', instant: true, refId: A}
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              conditions: [{evaluator: {params: [1], type: lt}, operator: {type: and}, query: {params: [B]}, reducer: {params: [], type: last}, type: query}]
              refId: B
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations: {summary: "Hannah Montana AI metrics endpoint is unavailable"}
        labels: {service: hannah-ai, severity: critical}

      - uid: hannah-ai-errors
        title: Hannah Montana AI error logs detected
        condition: B
        data:
          - refId: A
            relativeTimeRange: {from: 360, to: 0}
            datasourceUid: prometheus
            model: {expr: 'sum(increase(application_log_events_total{level="error"}[5m]))', instant: true, refId: A}
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              conditions: [{evaluator: {params: [2], type: gt}, operator: {type: and}, query: {params: [B]}, reducer: {params: [], type: last}, type: query}]
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations: {summary: "Hannah Montana AI emitted at least three ERROR logs in five minutes"}
        labels: {service: hannah-ai, severity: warning}

      - uid: omni-connect-host-disk-low
        title: OCI host disk space low
        condition: B
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model: {expr: '100 * node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}', instant: true, refId: A}
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              conditions: [{evaluator: {params: [10], type: lt}, operator: {type: and}, query: {params: [B]}, reducer: {params: [], type: last}, type: query}]
              refId: B
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        annotations: {summary: "OCI root filesystem has less than 10 percent free space"}
        labels: {service: omni-connect, severity: warning}

      - uid: omni-connect-support-errors
        title: OCI supporting service error logs detected
        condition: B
        data:
          - refId: A
            relativeTimeRange: {from: 360, to: 0}
            datasourceUid: loki
            model:
              datasource: {type: loki, uid: loki}
              editorMode: code
              expr: 'sum(count_over_time({container=~"hana-omni-connect-postgres|hana-omni-connect-redis|hannah-qwen"} |~ "(?i)(^|\\s)(ERROR|FATAL|PANIC)(:|\\s)" [5m]))'
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: range
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              conditions: [{evaluator: {params: [2], type: gt}, operator: {type: and}, query: {params: [B]}, reducer: {params: [], type: last}, type: query}]
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations: {summary: "PostgreSQL, Redis, or local Qwen emitted repeated error logs"}
        labels: {service: omni-connect, severity: warning}
