apiVersion: 1

contactPoints:
  - orgId: 1
    name: omnilens-discord
    receivers:
      - uid: omnilens-discord
        type: discord
        disableResolveMessage: false
        settings:
          url: $OMNILENS_DISCORD_WEBHOOK_URL
          use_discord_username: true
  - orgId: 1
    name: hannah-ai-discord
    receivers:
      - uid: hannah-ai-discord
        type: discord
        disableResolveMessage: false
        settings:
          url: $HANNAH_DISCORD_WEBHOOK_URL
          use_discord_username: true

policies:
  - orgId: 1
    receiver: omnilens-discord
    group_by: [alertname, service]
    group_wait: 15s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: hannah-ai-discord
        object_matchers:
          - [service, =, hannah-ai]
