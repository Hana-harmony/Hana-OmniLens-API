global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: hana-omnilens-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [hana-omnilens-api:8080]

  - job_name: hannah-montana-ai
    metrics_path: /metrics
    static_configs:
      - targets: [hannah-montana-ai:8000]

  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: blackbox-https
    metrics_path: /probe
    params:
      module: [https_2xx]
    static_configs:
      - targets:
          - https://hanaomilens.cloud
          - https://api.hanaomilens.cloud/actuator/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
