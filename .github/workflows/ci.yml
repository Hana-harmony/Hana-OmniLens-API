name: ci

on:
  pull_request:
    branches: [main, feature]
  push:
    branches: [main, feature]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '17'
      - name: Gradle 검증
        run: ./gradlew test bootJar --no-daemon

  deploy-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: hana-omnilens-api-production
      cancel-in-progress: false
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: 운영 secret 확인
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_HOST_KEY: ${{ secrets.PROD_HOST_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          API_KEY_SHA256: ${{ secrets.OMNILENS_API_KEY_SHA256 }}
          PORTAL_SESSION_KEY: ${{ secrets.OMNILENS_PORTAL_SESSION_SIGNING_KEY }}
          PORTAL_ENCRYPTION_KEY: ${{ secrets.OMNILENS_PORTAL_API_KEY_ENCRYPTION_KEY }}
          TERM_SALT: ${{ secrets.OMNILENS_TERM_ANALYTICS_HASH_SALT }}
          AI_TOKEN: ${{ secrets.HANNAH_AI_MAINTENANCE_TOKEN }}
          PUBLIC_DATA_KEY: ${{ secrets.PUBLIC_DATA_SERVICE_KEY }}
          NAVER_ID: ${{ secrets.NAVER_NEWS_CLIENT_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_NEWS_CLIENT_SECRET }}
          OPEN_DART_KEY: ${{ secrets.OPEN_DART_API_KEY }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PASSWORD: ${{ secrets.KRX_PW }}
          KRX_OPEN_API_KEY: ${{ secrets.KRX_OPEN_API_AUTH_KEY }}
          KIS_ACCOUNT: ${{ secrets.KIS_ACCOUNT_NUMBER }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_REAL_ACCOUNT: ${{ secrets.KIS_REAL_ACCOUNT_NUMBER }}
          KIS_REAL_APP_KEY: ${{ secrets.KIS_REAL_APP_KEY }}
          KIS_REAL_APP_SECRET: ${{ secrets.KIS_REAL_APP_SECRET }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
        run: |
          for name in PROD_HOST PROD_USER PROD_SSH_KEY PROD_HOST_KEY GHCR_TOKEN DB_URL DB_USERNAME DB_PASSWORD REDIS_HOST REDIS_PASSWORD API_KEY_SHA256 PORTAL_SESSION_KEY PORTAL_ENCRYPTION_KEY TERM_SALT AI_TOKEN PUBLIC_DATA_KEY NAVER_ID NAVER_SECRET OPEN_DART_KEY KRX_ID KRX_PASSWORD KRX_OPEN_API_KEY KIS_ACCOUNT KIS_APP_KEY KIS_APP_SECRET KIS_REAL_ACCOUNT KIS_REAL_APP_KEY KIS_REAL_APP_SECRET LETSENCRYPT_EMAIL; do
            : "${!name:?${name} is required}"
          done
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: 이미지 이름 설정
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: ARM64 운영 이미지 빌드
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: SSH 설정
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.PROD_SSH_KEY }}' > ~/.ssh/prod_key
          printf '%s\n' '${{ secrets.PROD_HOST_KEY }}' > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/prod_key ~/.ssh/known_hosts
      - name: 운영 설정 생성
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          API_KEY_SHA256: ${{ secrets.OMNILENS_API_KEY_SHA256 }}
          PORTAL_SESSION_KEY: ${{ secrets.OMNILENS_PORTAL_SESSION_SIGNING_KEY }}
          PORTAL_ENCRYPTION_KEY: ${{ secrets.OMNILENS_PORTAL_API_KEY_ENCRYPTION_KEY }}
          TERM_SALT: ${{ secrets.OMNILENS_TERM_ANALYTICS_HASH_SALT }}
          AI_TOKEN: ${{ secrets.HANNAH_AI_MAINTENANCE_TOKEN }}
          PUBLIC_DATA_KEY: ${{ secrets.PUBLIC_DATA_SERVICE_KEY }}
          NAVER_ID: ${{ secrets.NAVER_NEWS_CLIENT_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_NEWS_CLIENT_SECRET }}
          OPEN_DART_KEY: ${{ secrets.OPEN_DART_API_KEY }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PASSWORD: ${{ secrets.KRX_PW }}
          KRX_OPEN_API_KEY: ${{ secrets.KRX_OPEN_API_AUTH_KEY }}
          KIS_ACCOUNT: ${{ secrets.KIS_ACCOUNT_NUMBER }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_REAL_ACCOUNT: ${{ secrets.KIS_REAL_ACCOUNT_NUMBER }}
          KIS_REAL_APP_KEY: ${{ secrets.KIS_REAL_APP_KEY }}
          KIS_REAL_APP_SECRET: ${{ secrets.KIS_REAL_APP_SECRET }}
        run: |
          printf '%s\n' \
            'JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=70 -XX:+ExitOnOutOfMemoryError' \
            'SERVER_PORT=8080' \
            'SERVER_FORWARD_HEADERS_STRATEGY=native' \
            "OMNILENS_API_KEY_SHA256=${API_KEY_SHA256}" \
            'OMNILENS_API_KEY_PARTNER_IDS=stock-exchange' \
            'OMNILENS_CORS_ALLOWED_ORIGINS=https://hanaomilens.cloud' \
            "OMNILENS_PORTAL_SESSION_SIGNING_KEY=${PORTAL_SESSION_KEY}" \
            "OMNILENS_PORTAL_API_KEY_ENCRYPTION_KEY=${PORTAL_ENCRYPTION_KEY}" \
            "OMNILENS_TERM_ANALYTICS_HASH_SALT=${TERM_SALT}" \
            "HANNAH_AI_MAINTENANCE_TOKEN=${AI_TOKEN}" \
            'HANNAH_AI_BASE_URL=http://host.docker.internal:18090' \
            "DB_URL=${DB_URL}" \
            "DB_USERNAME=${DB_USERNAME}" \
            "DB_PASSWORD=${DB_PASSWORD}" \
            "REDIS_HOST=${REDIS_HOST}" \
            "REDIS_PORT=${REDIS_PORT:-6379}" \
            "REDIS_PASSWORD=${REDIS_PASSWORD}" \
            "PUBLIC_DATA_SERVICE_KEY=${PUBLIC_DATA_KEY}" \
            "NAVER_NEWS_CLIENT_ID=${NAVER_ID}" \
            "NAVER_NEWS_CLIENT_SECRET=${NAVER_SECRET}" \
            "OPEN_DART_API_KEY=${OPEN_DART_KEY}" \
            "KRX_ID=${KRX_ID}" \
            "KRX_PW=${KRX_PASSWORD}" \
            "KRX_OPEN_API_AUTH_KEY=${KRX_OPEN_API_KEY}" \
            "KIS_ACCOUNT_NUMBER=${KIS_ACCOUNT}" \
            "KIS_APP_KEY=${KIS_APP_KEY}" \
            "KIS_APP_SECRET=${KIS_APP_SECRET}" \
            "KIS_REAL_ACCOUNT_NUMBER=${KIS_REAL_ACCOUNT}" \
            "KIS_REAL_APP_KEY=${KIS_REAL_APP_KEY}" \
            "KIS_REAL_APP_SECRET=${KIS_REAL_APP_SECRET}" \
            > application.env
          printf '%s\n' \
            "IMAGE=${IMAGE_NAME}:${GITHUB_SHA}" \
            "GHCR_TOKEN=${GHCR_TOKEN}" \
            > deploy.env
          chmod 600 application.env deploy.env
      - name: OCI 무중단 배포
        run: |
          ssh -i ~/.ssh/prod_key '${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}' 'sudo install -d -o "$(id -un)" -g "$(id -gn)" -m 700 /opt/hana-omnilens-api'
          scp -i ~/.ssh/prod_key application.env deploy.env scripts/deploy-prod.sh scripts/bootstrap-host.sh scripts/bootstrap-https.sh deploy/nginx/hana-omnilens-api.conf deploy/nginx/bootstrap-http.conf '${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/opt/hana-omnilens-api/'
          ssh -i ~/.ssh/prod_key '${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}' 'chmod 700 /opt/hana-omnilens-api/bootstrap-host.sh && /opt/hana-omnilens-api/bootstrap-host.sh'
          ssh -i ~/.ssh/prod_key '${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}' "if [ ! -f /etc/letsencrypt/live/api.hanaomilens.cloud/fullchain.pem ]; then chmod 700 /opt/hana-omnilens-api/bootstrap-https.sh && LETSENCRYPT_EMAIL='${{ secrets.LETSENCRYPT_EMAIL }}' /opt/hana-omnilens-api/bootstrap-https.sh; fi"
          ssh -i ~/.ssh/prod_key '${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}' 'chmod 700 /opt/hana-omnilens-api/deploy-prod.sh && /opt/hana-omnilens-api/deploy-prod.sh'
