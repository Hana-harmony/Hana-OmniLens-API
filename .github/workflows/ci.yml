name: ci

on:
  pull_request:
    branches: [main, feature]
  push:
    branches: [main, feature]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          distribution: temurin
          java-version: '17'
      - name: Gradle 검증
        run: ./gradlew test bootJar --no-daemon

  deploy-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: hana-omnilens-api-production
      cancel-in-progress: false
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: 운영 secret 확인
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_HOST_KEY: ${{ secrets.PROD_HOST_KEY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          API_KEY_SHA256: ${{ secrets.OMNILENS_API_KEY_SHA256 }}
          PORTAL_SESSION_KEY: ${{ secrets.OMNILENS_PORTAL_SESSION_SIGNING_KEY }}
          PORTAL_ENCRYPTION_KEY: ${{ secrets.OMNILENS_PORTAL_API_KEY_ENCRYPTION_KEY }}
          PORTAL_BOOTSTRAP_PASSWORD: ${{ secrets.OMNILENS_PORTAL_BOOTSTRAP_ADMIN_PASSWORD }}
          TERM_SALT: ${{ secrets.OMNILENS_TERM_ANALYTICS_HASH_SALT }}
          AI_TOKEN: ${{ secrets.HANNAH_AI_MAINTENANCE_TOKEN }}
          PUBLIC_DATA_KEY: ${{ secrets.PUBLIC_DATA_SERVICE_KEY }}
          NAVER_ID: ${{ secrets.NAVER_NEWS_CLIENT_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_NEWS_CLIENT_SECRET }}
          OPEN_DART_KEY: ${{ secrets.OPEN_DART_API_KEY }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PASSWORD: ${{ secrets.KRX_PW }}
          KRX_OPEN_API_KEY: ${{ secrets.KRX_OPEN_API_AUTH_KEY }}
          KIS_ACCOUNT: ${{ secrets.KIS_ACCOUNT_NUMBER }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_REAL_ACCOUNT: ${{ secrets.KIS_REAL_ACCOUNT_NUMBER }}
          KIS_REAL_APP_KEY: ${{ secrets.KIS_REAL_APP_KEY }}
          KIS_REAL_APP_SECRET: ${{ secrets.KIS_REAL_APP_SECRET }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          OMNILENS_DISCORD_WEBHOOK: ${{ secrets.OMNILENS_DISCORD_WEBHOOK_URL }}
          HANNAH_DISCORD_WEBHOOK: ${{ secrets.HANNAH_DISCORD_WEBHOOK_URL }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          for name in PROD_HOST PROD_USER PROD_SSH_KEY PROD_HOST_KEY GHCR_USERNAME GHCR_TOKEN DB_PASSWORD REDIS_PASSWORD API_KEY_SHA256 PORTAL_SESSION_KEY PORTAL_ENCRYPTION_KEY PORTAL_BOOTSTRAP_PASSWORD TERM_SALT AI_TOKEN PUBLIC_DATA_KEY NAVER_ID NAVER_SECRET OPEN_DART_KEY KRX_ID KRX_PASSWORD KRX_OPEN_API_KEY KIS_ACCOUNT KIS_APP_KEY KIS_APP_SECRET KIS_REAL_ACCOUNT KIS_REAL_APP_KEY KIS_REAL_APP_SECRET LETSENCRYPT_EMAIL OMNILENS_DISCORD_WEBHOOK HANNAH_DISCORD_WEBHOOK GRAFANA_ADMIN_PASSWORD; do
            : "${!name:?${name} is required}"
          done
          [[ "${#DB_PASSWORD}" -ge 32 && "${DB_PASSWORD}" != *[[:space:]]* ]]
          [[ "${#REDIS_PASSWORD}" -ge 32 && "${REDIS_PASSWORD}" != *[[:space:]]* ]]
          [[ "${#GRAFANA_ADMIN_PASSWORD}" -ge 32 ]]
          [[ "${OMNILENS_DISCORD_WEBHOOK}" == https://discord.com/api/webhooks/* ]]
          [[ "${HANNAH_DISCORD_WEBHOOK}" == https://discord.com/api/webhooks/* ]]
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - name: 이미지 이름 설정
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: ARM64 운영 이미지 빌드
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: SSH 설정
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.PROD_SSH_KEY }}' > ~/.ssh/prod_key
          printf '%s\n' '${{ secrets.PROD_HOST_KEY }}' > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/prod_key ~/.ssh/known_hosts
      - name: 운영 설정 생성
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          API_KEY_SHA256: ${{ secrets.OMNILENS_API_KEY_SHA256 }}
          PORTAL_SESSION_KEY: ${{ secrets.OMNILENS_PORTAL_SESSION_SIGNING_KEY }}
          PORTAL_ENCRYPTION_KEY: ${{ secrets.OMNILENS_PORTAL_API_KEY_ENCRYPTION_KEY }}
          PORTAL_BOOTSTRAP_PASSWORD: ${{ secrets.OMNILENS_PORTAL_BOOTSTRAP_ADMIN_PASSWORD }}
          TERM_SALT: ${{ secrets.OMNILENS_TERM_ANALYTICS_HASH_SALT }}
          AI_TOKEN: ${{ secrets.HANNAH_AI_MAINTENANCE_TOKEN }}
          PUBLIC_DATA_KEY: ${{ secrets.PUBLIC_DATA_SERVICE_KEY }}
          NAVER_ID: ${{ secrets.NAVER_NEWS_CLIENT_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_NEWS_CLIENT_SECRET }}
          OPEN_DART_KEY: ${{ secrets.OPEN_DART_API_KEY }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PASSWORD: ${{ secrets.KRX_PW }}
          KRX_OPEN_API_KEY: ${{ secrets.KRX_OPEN_API_AUTH_KEY }}
          KIS_ACCOUNT: ${{ secrets.KIS_ACCOUNT_NUMBER }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_REAL_ACCOUNT: ${{ secrets.KIS_REAL_ACCOUNT_NUMBER }}
          KIS_REAL_APP_KEY: ${{ secrets.KIS_REAL_APP_KEY }}
          KIS_REAL_APP_SECRET: ${{ secrets.KIS_REAL_APP_SECRET }}
          OMNILENS_DISCORD_WEBHOOK: ${{ secrets.OMNILENS_DISCORD_WEBHOOK_URL }}
          HANNAH_DISCORD_WEBHOOK: ${{ secrets.HANNAH_DISCORD_WEBHOOK_URL }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          printf '%s\n' \
            'JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=70 -XX:+ExitOnOutOfMemoryError' \
            'SERVER_PORT=8080' \
            'SERVER_FORWARD_HEADERS_STRATEGY=native' \
            "OMNILENS_API_KEY_SHA256=${API_KEY_SHA256}" \
            'OMNILENS_API_KEY_PARTNER_IDS=stock-exchange' \
            'OMNILENS_CORS_ALLOWED_ORIGINS=https://hanaomni.cloud' \
            "OMNILENS_PORTAL_SESSION_SIGNING_KEY=${PORTAL_SESSION_KEY}" \
            "OMNILENS_PORTAL_API_KEY_ENCRYPTION_KEY=${PORTAL_ENCRYPTION_KEY}" \
            "OMNILENS_PORTAL_BOOTSTRAP_ADMIN_PASSWORD=${PORTAL_BOOTSTRAP_PASSWORD}" \
            "OMNILENS_TERM_ANALYTICS_HASH_SALT=${TERM_SALT}" \
            "HANNAH_AI_MAINTENANCE_TOKEN=${AI_TOKEN}" \
            'HANNAH_AI_BASE_URL=http://hannah-montana-ai:8000' \
            'DB_URL=jdbc:postgresql://hana-omnilens-postgres:5432/omnilens' \
            'DB_USERNAME=omnilens_app' \
            "DB_PASSWORD=${DB_PASSWORD}" \
            'REDIS_HOST=hana-omnilens-redis' \
            'REDIS_PORT=6379' \
            "REDIS_PASSWORD=${REDIS_PASSWORD}" \
            "PUBLIC_DATA_SERVICE_KEY=${PUBLIC_DATA_KEY}" \
            "NAVER_NEWS_CLIENT_ID=${NAVER_ID}" \
            "NAVER_NEWS_CLIENT_SECRET=${NAVER_SECRET}" \
            "OPEN_DART_API_KEY=${OPEN_DART_KEY}" \
            "KRX_ID=${KRX_ID}" \
            "KRX_PW=${KRX_PASSWORD}" \
            "KRX_OPEN_API_AUTH_KEY=${KRX_OPEN_API_KEY}" \
            "KIS_ACCOUNT_NUMBER=${KIS_ACCOUNT}" \
            "KIS_APP_KEY=${KIS_APP_KEY}" \
            "KIS_APP_SECRET=${KIS_APP_SECRET}" \
            "KIS_REAL_ACCOUNT_NUMBER=${KIS_REAL_ACCOUNT}" \
            "KIS_REAL_APP_KEY=${KIS_REAL_APP_KEY}" \
            "KIS_REAL_APP_SECRET=${KIS_REAL_APP_SECRET}" \
            "OMNILENS_DISCORD_WEBHOOK_URL=${OMNILENS_DISCORD_WEBHOOK}" \
            > application.env
          printf '%s\n' \
            "IMAGE=${IMAGE_NAME}:${GITHUB_SHA}" \
            "GHCR_USERNAME=${GHCR_USERNAME}" \
            "GHCR_TOKEN=${GHCR_TOKEN}" \
            > deploy.env
          printf '%s' "${DB_PASSWORD}" > postgres-password
          printf 'user default off\nuser omnilens_app reset on >%s ~omnilens:* &* +@connection +@read +@write +@scripting -@dangerous\n' "${REDIS_PASSWORD}" > redis-users.acl
          printf '%s\n' \
            "GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}" \
            "OMNILENS_DISCORD_WEBHOOK_URL=${OMNILENS_DISCORD_WEBHOOK}" \
            "HANNAH_DISCORD_WEBHOOK_URL=${HANNAH_DISCORD_WEBHOOK}" \
            > monitoring.env
          chmod 600 application.env deploy.env monitoring.env postgres-password redis-users.acl
      - name: OCI 운영 배포
        run: |
          ssh -i ~/.ssh/prod_key '${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}' 'sudo install -d -o "$(id -un)" -g "$(id -gn)" -m 700 /opt/hana-omnilens-api /opt/hana-omnilens-api/deploy /opt/hana-omnilens-api/deploy/systemd'
          scp -i ~/.ssh/prod_key application.env deploy.env monitoring.env postgres-password redis-users.acl scripts/deploy-prod.sh scripts/bootstrap-host.sh scripts/bootstrap-data-services.sh scripts/bootstrap-https.sh scripts/bootstrap-monitoring.sh scripts/backup-postgres.sh deploy/compose/hana-omnilens-data.yml deploy/nginx/hana-omnilens-api.conf deploy/nginx/bootstrap-http.conf deploy/systemd/hana-omnilens-postgres-backup.service deploy/systemd/hana-omnilens-postgres-backup.timer '${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/opt/hana-omnilens-api/'
          scp -r -i ~/.ssh/prod_key deploy/monitoring '${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/opt/hana-omnilens-api/deploy/'
          scp -i ~/.ssh/prod_key deploy/systemd/hana-omnilens-monitoring.service '${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/opt/hana-omnilens-api/deploy/systemd/'
          ssh -i ~/.ssh/prod_key '${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}' 'chmod 700 /opt/hana-omnilens-api/bootstrap-host.sh && /opt/hana-omnilens-api/bootstrap-host.sh'
          ssh -i ~/.ssh/prod_key '${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}' 'chmod 700 /opt/hana-omnilens-api/bootstrap-data-services.sh && /opt/hana-omnilens-api/bootstrap-data-services.sh'
          ssh -i ~/.ssh/prod_key '${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}' "if [ ! -f /etc/letsencrypt/live/api.hanaomni.cloud/fullchain.pem ]; then chmod 700 /opt/hana-omnilens-api/bootstrap-https.sh && LETSENCRYPT_EMAIL='${{ secrets.LETSENCRYPT_EMAIL }}' /opt/hana-omnilens-api/bootstrap-https.sh; fi"
          ssh -i ~/.ssh/prod_key '${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}' 'chmod 700 /opt/hana-omnilens-api/deploy-prod.sh && /opt/hana-omnilens-api/deploy-prod.sh'
          ssh -i ~/.ssh/prod_key '${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}' 'chmod 700 /opt/hana-omnilens-api/bootstrap-monitoring.sh && /opt/hana-omnilens-api/bootstrap-monitoring.sh'
