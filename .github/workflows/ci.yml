name: ci

on:
  pull_request:
    branches: [main, feature]
  push:
    branches: [main, feature]

permissions:
  contents: read
  packages: write

env:
  PROD_APP_DIR: /opt/hana-omnilens-api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Gradle 검증
        run: ./gradlew test --no-daemon

  deploy-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: 이미지 이름 설정
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 운영 이미지 빌드 및 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
      - name: SSH 키 설정
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts
      - name: 운영 환경 변수 파일 생성
        run: |
          printf '%s\n' \
            "SERVER_PORT=${{ secrets.SERVER_PORT }}" \
            "OMNILENS_API_KEY_SHA256=${{ secrets.OMNILENS_API_KEY_SHA256 }}" \
            "OMNILENS_CORS_ALLOWED_ORIGINS=${{ secrets.OMNILENS_CORS_ALLOWED_ORIGINS }}" \
            "DB_URL=${{ secrets.DB_URL }}" \
            "DB_USERNAME=${{ secrets.DB_USERNAME }}" \
            "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            "REDIS_HOST=${{ secrets.REDIS_HOST }}" \
            "REDIS_PORT=${{ secrets.REDIS_PORT }}" \
            "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" \
            "PUBLIC_DATA_SERVICE_KEY=${{ secrets.PUBLIC_DATA_SERVICE_KEY }}" \
            "NAVER_NEWS_CLIENT_ID=${{ secrets.NAVER_NEWS_CLIENT_ID }}" \
            "NAVER_NEWS_CLIENT_SECRET=${{ secrets.NAVER_NEWS_CLIENT_SECRET }}" \
            "OPEN_DART_API_KEY=${{ secrets.OPEN_DART_API_KEY }}" \
            > application-prod.env
          printf '%s\n' \
            "HANA_OMNILENS_IMAGE=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            "GHCR_TOKEN=${{ secrets.GHCR_TOKEN }}" \
            > deploy-prod.env
      - name: 운영 서버로 배포
        run: |
          ssh -i ~/.ssh/prod_key "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
            "mkdir -p '${PROD_APP_DIR}'"
          scp -i ~/.ssh/prod_key src/main/resources/application-prod.yml "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${PROD_APP_DIR}/application-prod.yml"
          scp -i ~/.ssh/prod_key application-prod.env "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${PROD_APP_DIR}/application-prod.env"
          scp -i ~/.ssh/prod_key deploy-prod.env "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${PROD_APP_DIR}/deploy-prod.env"
          scp -i ~/.ssh/prod_key compose.prod.yml "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${PROD_APP_DIR}/compose.prod.yml"
          scp -i ~/.ssh/prod_key scripts/deploy-prod.sh "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${PROD_APP_DIR}/deploy.sh"
          ssh -i ~/.ssh/prod_key "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
            "cd '${PROD_APP_DIR}' && chmod 700 ./deploy.sh && ./deploy.sh"
