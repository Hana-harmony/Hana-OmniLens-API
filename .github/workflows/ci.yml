name: ci

on:
  pull_request:
    branches: [main, feature]
  push:
    branches: [main, feature]

permissions:
  contents: read
  packages: write

env:
  PROD_APP_DIR: /opt/hana-omnilens-api
  DOCKER_BUILD_RECORD_UPLOAD: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Gradle 검증
        run: ./gradlew test --no-daemon

  deploy-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: 운영 배포 설정 확인
        id: deploy-config
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          OMNILENS_API_KEY_SHA256: ${{ secrets.OMNILENS_API_KEY_SHA256 }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
        run: |
          missing=()
          for name in \
            PROD_HOST PROD_USER PROD_SSH_KEY GHCR_TOKEN SERVER_PORT \
            OMNILENS_API_KEY_SHA256 DB_URL DB_USERNAME DB_PASSWORD \
            REDIS_HOST REDIS_PORT
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'configured=false\n' >> "$GITHUB_OUTPUT"
            printf '운영 배포 secret 미설정으로 deploy-prod를 건너뜁니다: %s\n' "${missing[*]}"
          else
            printf 'configured=true\n' >> "$GITHUB_OUTPUT"
          fi
      - name: 이미지 이름 설정
        if: steps.deploy-config.outputs.configured == 'true'
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
      - if: steps.deploy-config.outputs.configured == 'true'
        uses: docker/setup-buildx-action@v3
      - name: GHCR 로그인
        if: steps.deploy-config.outputs.configured == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 운영 이미지 빌드 및 푸시
        if: steps.deploy-config.outputs.configured == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
      - name: SSH 키 설정
        if: steps.deploy-config.outputs.configured == 'true'
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts
      - name: 운영 환경 변수 파일 생성
        if: steps.deploy-config.outputs.configured == 'true'
        run: |
          printf '%s\n' \
            "SERVER_PORT=${{ secrets.SERVER_PORT }}" \
            "SERVER_SSL_ENABLED=${{ secrets.SERVER_SSL_ENABLED || 'false' }}" \
            "SERVER_SSL_CLIENT_AUTH=${{ secrets.SERVER_SSL_CLIENT_AUTH || 'none' }}" \
            "SERVER_SSL_KEY_STORE=${{ secrets.SERVER_SSL_KEY_STORE || '/app/config/tls/server-keystore.p12' }}" \
            "SERVER_SSL_KEY_STORE_PASSWORD=${{ secrets.SERVER_SSL_KEY_STORE_PASSWORD }}" \
            "SERVER_SSL_KEY_STORE_TYPE=${{ secrets.SERVER_SSL_KEY_STORE_TYPE || 'PKCS12' }}" \
            "SERVER_SSL_TRUST_STORE=${{ secrets.SERVER_SSL_TRUST_STORE || '/app/config/tls/client-truststore.p12' }}" \
            "SERVER_SSL_TRUST_STORE_PASSWORD=${{ secrets.SERVER_SSL_TRUST_STORE_PASSWORD }}" \
            "SERVER_SSL_TRUST_STORE_TYPE=${{ secrets.SERVER_SSL_TRUST_STORE_TYPE || 'PKCS12' }}" \
            "HEALTHCHECK_SCHEME=${{ secrets.HEALTHCHECK_SCHEME || 'http' }}" \
            "OMNILENS_API_KEY_SHA256=${{ secrets.OMNILENS_API_KEY_SHA256 }}" \
            "OMNILENS_CORS_ALLOWED_ORIGINS=${{ secrets.OMNILENS_CORS_ALLOWED_ORIGINS }}" \
            "OMNILENS_SIGNATURE_ENABLED=${{ secrets.OMNILENS_SIGNATURE_ENABLED || 'false' }}" \
            "OMNILENS_SIGNATURE_SECRET=${{ secrets.OMNILENS_SIGNATURE_SECRET }}" \
            "OMNILENS_SIGNATURE_ALLOWED_CLOCK_SKEW=${{ secrets.OMNILENS_SIGNATURE_ALLOWED_CLOCK_SKEW || '5m' }}" \
            "OMNILENS_SIGNATURE_NONCE_STORE_MODE=${{ secrets.OMNILENS_SIGNATURE_NONCE_STORE_MODE || 'redis' }}" \
            "OMNILENS_SIGNATURE_MAX_NONCES=${{ secrets.OMNILENS_SIGNATURE_MAX_NONCES || '10000' }}" \
            "OMNILENS_MTLS_ENABLED=${{ secrets.OMNILENS_MTLS_ENABLED || 'false' }}" \
            "DB_URL=${{ secrets.DB_URL }}" \
            "DB_USERNAME=${{ secrets.DB_USERNAME }}" \
            "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            "REDIS_HOST=${{ secrets.REDIS_HOST }}" \
            "REDIS_PORT=${{ secrets.REDIS_PORT }}" \
            "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" \
            "PUBLIC_DATA_SERVICE_KEY=${{ secrets.PUBLIC_DATA_SERVICE_KEY }}" \
            "NAVER_NEWS_CLIENT_ID=${{ secrets.NAVER_NEWS_CLIENT_ID }}" \
            "NAVER_NEWS_CLIENT_SECRET=${{ secrets.NAVER_NEWS_CLIENT_SECRET }}" \
            "PAPAGO_TRANSLATION_CLIENT_ID=${{ secrets.PAPAGO_TRANSLATION_CLIENT_ID }}" \
            "PAPAGO_TRANSLATION_CLIENT_SECRET=${{ secrets.PAPAGO_TRANSLATION_CLIENT_SECRET }}" \
            "OPEN_DART_API_KEY=${{ secrets.OPEN_DART_API_KEY }}" \
            "KOREA_EXIM_AUTH_KEY=${{ secrets.KOREA_EXIM_AUTH_KEY }}" \
            "PROVIDER_CONNECT_TIMEOUT=${{ secrets.PROVIDER_CONNECT_TIMEOUT || '2s' }}" \
            "PROVIDER_READ_TIMEOUT=${{ secrets.PROVIDER_READ_TIMEOUT || '5s' }}" \
            "PROVIDER_RETRY_ENABLED=${{ secrets.PROVIDER_RETRY_ENABLED || 'true' }}" \
            "PROVIDER_RETRY_MAX_ATTEMPTS=${{ secrets.PROVIDER_RETRY_MAX_ATTEMPTS || '2' }}" \
            "PROVIDER_RETRY_BACKOFF=${{ secrets.PROVIDER_RETRY_BACKOFF || '150ms' }}" \
            "PROVIDER_CIRCUIT_BREAKER_ENABLED=${{ secrets.PROVIDER_CIRCUIT_BREAKER_ENABLED || 'true' }}" \
            "PROVIDER_CIRCUIT_BREAKER_FAILURE_THRESHOLD=${{ secrets.PROVIDER_CIRCUIT_BREAKER_FAILURE_THRESHOLD || '5' }}" \
            "PROVIDER_CIRCUIT_BREAKER_OPEN_DURATION=${{ secrets.PROVIDER_CIRCUIT_BREAKER_OPEN_DURATION || '30s' }}" \
            "STOCK_MASTER_SEED_ENABLED=${{ secrets.STOCK_MASTER_SEED_ENABLED || 'true' }}" \
            "STOCK_MASTER_SEED_LOCATION=${{ secrets.STOCK_MASTER_SEED_LOCATION || 'classpath:data/stock-master-seed.csv' }}" \
            > application-prod.env
          printf '%s\n' \
            "HANA_OMNILENS_IMAGE=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            "GHCR_TOKEN=${{ secrets.GHCR_TOKEN }}" \
            > deploy-prod.env
          mkdir -p tls
          if [ -n "${{ secrets.SERVER_SSL_KEY_STORE_BASE64 }}" ]; then
            printf '%s' "${{ secrets.SERVER_SSL_KEY_STORE_BASE64 }}" | base64 -d > tls/server-keystore.p12
          fi
          if [ -n "${{ secrets.SERVER_SSL_TRUST_STORE_BASE64 }}" ]; then
            printf '%s' "${{ secrets.SERVER_SSL_TRUST_STORE_BASE64 }}" | base64 -d > tls/client-truststore.p12
          fi
      - name: 운영 서버로 배포
        if: steps.deploy-config.outputs.configured == 'true'
        run: |
          ssh -i ~/.ssh/prod_key "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
            "mkdir -p '${PROD_APP_DIR}/tls'"
          scp -i ~/.ssh/prod_key src/main/resources/application-prod.yml "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${PROD_APP_DIR}/application-prod.yml"
          scp -i ~/.ssh/prod_key application-prod.env "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${PROD_APP_DIR}/application-prod.env"
          scp -i ~/.ssh/prod_key deploy-prod.env "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${PROD_APP_DIR}/deploy-prod.env"
          scp -i ~/.ssh/prod_key compose.prod.yml "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${PROD_APP_DIR}/compose.prod.yml"
          scp -i ~/.ssh/prod_key scripts/deploy-prod.sh "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${PROD_APP_DIR}/deploy.sh"
          if find tls -maxdepth 1 -type f | grep -q .; then
            scp -i ~/.ssh/prod_key tls/* "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${PROD_APP_DIR}/tls/"
          fi
          ssh -i ~/.ssh/prod_key "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
            "cd '${PROD_APP_DIR}' && chmod 700 ./deploy.sh && ./deploy.sh"
