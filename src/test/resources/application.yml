spring:
  datasource:
    url: jdbc:h2:mem:omnilens-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  health:
    redis:
      enabled: false

omnilens:
  portal:
    bootstrap-admin-password: Local-Test-Only-Initial-Secret-2026!
  security:
    api-key-partner-ids:
      - partner-api
      - partner-a
      - partner-b
      - partner-provider-collection
      - partner-invalid-stock
      - partner-unknown-stock
    rate-limit:
      enabled: false
    signature:
      enabled: false
  market:
    stock-master:
      seed:
        enabled: true
        location: classpath:data/stock-master-seed.csv
        kis-master-sync-enabled: false
    chart-warmup:
      enabled: false
    exchange-rate-refresh:
      enabled: false
    history-collection:
      enabled: false
    foreign-ownership-refresh:
      enabled: false
    foreign-ownership-model-training:
      enabled: false
    foreign-ownership-prediction-precompute:
      enabled: false
    kis-realtime:
      enabled: false
  market-news:
    scheduler:
      enabled: false
  alert:
    scheduler:
      enabled: false
