server:
  port: ${SERVER_PORT:8080}

omnilens:
  security:
    api-key-sha256: ${OMNILENS_API_KEY_SHA256}
    api-key-partner-ids: ${OMNILENS_API_KEY_PARTNER_IDS}
    cors-allowed-origins: ${OMNILENS_CORS_ALLOWED_ORIGINS}
    rate-limit:
      enabled: true
      max-requests: 120
      window: 1m
    signature:
      enabled: true
      allowed-clock-skew: 2m
      nonce-store-mode: redis
      max-nonces: 10000
  portal:
    session-signing-key: ${OMNILENS_PORTAL_SESSION_SIGNING_KEY}
    api-key-encryption-key: ${OMNILENS_PORTAL_API_KEY_ENCRYPTION_KEY}
  providers:
    public-data:
      stock-securities-base-url: ${PUBLIC_DATA_STOCK_SECURITIES_BASE_URL:https://apis.data.go.kr/1160100/service/GetStockSecuritiesInfoService}
      service-key: ${PUBLIC_DATA_SERVICE_KEY}
    naver-news:
      base-url: ${NAVER_NEWS_BASE_URL:https://openapi.naver.com}
      client-id: ${NAVER_NEWS_CLIENT_ID}
      client-secret: ${NAVER_NEWS_CLIENT_SECRET}
    open-dart:
      base-url: ${OPEN_DART_BASE_URL:https://opendart.fss.or.kr}
      api-key: ${OPEN_DART_API_KEY}
    krx:
      base-url: ${KRX_BASE_URL:https://data.krx.co.kr}
      scraping-enabled: true
      id: ${KRX_ID}
      password: ${KRX_PW}
      login-path: ${KRX_LOGIN_PATH:/contents/MDC/COMS/client/MDCCOMS001D1.cmd}
      foreign-ownership-history-bld: ${KRX_FOREIGN_OWNERSHIP_HISTORY_BLD:dbms/MDC/STAT/standard/MDCSTAT03702}
    krx-open-api:
      base-url: ${KRX_OPEN_API_BASE_URL:https://data-dbg.krx.co.kr}
      auth-key: ${KRX_OPEN_API_AUTH_KEY}
    kis:
      base-url: ${KIS_BASE_URL:https://openapi.koreainvestment.com:9443}
      websocket-url: ${KIS_WEBSOCKET_URL:ws://ops.koreainvestment.com:21000}
      account-number: ${KIS_ACCOUNT_NUMBER}
      app-key: ${KIS_APP_KEY}
      app-secret: ${KIS_APP_SECRET}
    real-kis:
      base-url: ${KIS_REAL_BASE_URL:https://openapi.koreainvestment.com:9443}
      websocket-url: ${KIS_REAL_WEBSOCKET_URL:ws://ops.koreainvestment.com:21000}
      account-number: ${KIS_REAL_ACCOUNT_NUMBER}
      app-key: ${KIS_REAL_APP_KEY}
      app-secret: ${KIS_REAL_APP_SECRET}
    frankfurter:
      base-url: ${FRANKFURTER_BASE_URL:https://api.frankfurter.dev}
    resilience:
      connect-timeout: ${PROVIDER_CONNECT_TIMEOUT:2s}
      read-timeout: ${PROVIDER_READ_TIMEOUT:5s}
      retry:
        enabled: true
        max-attempts: ${PROVIDER_RETRY_MAX_ATTEMPTS:2}
        backoff: ${PROVIDER_RETRY_BACKOFF:150ms}
      circuit-breaker:
        enabled: true
        failure-threshold: ${PROVIDER_CIRCUIT_BREAKER_FAILURE_THRESHOLD:5}
        open-duration: ${PROVIDER_CIRCUIT_BREAKER_OPEN_DURATION:30s}
  ai:
    hannah:
      base-url: ${HANNAH_AI_BASE_URL:http://hannah-montana-ai:8000}
      connect-timeout: ${HANNAH_AI_CONNECT_TIMEOUT:2s}
      read-timeout: ${HANNAH_AI_READ_TIMEOUT:30m}
  term:
    analytics:
      hash-salt: ${OMNILENS_TERM_ANALYTICS_HASH_SALT}
  market:
    stock-master:
      seed:
        enabled: true
        location: ${STOCK_MASTER_SEED_LOCATION:classpath:data/stock-master-seed.csv}
        kis-master-sync-enabled: true
    exchange-rate-cache:
      mode: redis
      ttl: ${EXCHANGE_RATE_CACHE_TTL:24h}
    foreign-ownership-cache:
      mode: redis
      ttl: ${FOREIGN_OWNERSHIP_CACHE_TTL:24h}
    foreign-ownership-refresh:
      enabled: true
      fixed-delay-ms: ${FOREIGN_OWNERSHIP_REFRESH_FIXED_DELAY_MS:86400000}
      initial-delay-ms: ${FOREIGN_OWNERSHIP_REFRESH_INITIAL_DELAY_MS:60000}
      cron: "${FOREIGN_OWNERSHIP_REFRESH_CRON:0 10 8,16 * * MON-FRI}"
      request-delay-ms: ${FOREIGN_OWNERSHIP_REFRESH_REQUEST_DELAY_MS:1200}
      base-date-offset-days: ${FOREIGN_OWNERSHIP_REFRESH_BASE_DATE_OFFSET_DAYS:1}
      backfill-lookback-days: ${FOREIGN_OWNERSHIP_REFRESH_BACKFILL_LOOKBACK_DAYS:400}
      stock-limit: ${FOREIGN_OWNERSHIP_REFRESH_STOCK_LIMIT:5000}
      stock-codes: ${FOREIGN_OWNERSHIP_REFRESH_STOCK_CODES:}
    foreign-ownership-model-training:
      enabled: true
      trigger-after-refresh: true
      connect-timeout: ${FOREIGN_OWNERSHIP_MODEL_TRAINING_CONNECT_TIMEOUT:2s}
      read-timeout: ${FOREIGN_OWNERSHIP_MODEL_TRAINING_READ_TIMEOUT:20m}
      maintenance-token: ${HANNAH_AI_MAINTENANCE_TOKEN:}
      minimum-promotable-stock-count: ${FOREIGN_OWNERSHIP_MODEL_TRAINING_MIN_STOCK_COUNT:29}
      minimum-promotable-history-days: ${FOREIGN_OWNERSHIP_MODEL_TRAINING_MIN_HISTORY_DAYS:2500}
      minimum-promotable-observations: ${FOREIGN_OWNERSHIP_MODEL_TRAINING_MIN_OBSERVATIONS:50000}
      max-model-training-samples: ${FOREIGN_OWNERSHIP_MODEL_TRAINING_MAX_SAMPLES:250000}
    foreign-ownership-prediction-precompute:
      enabled: true
      trigger-after-refresh: true
      stock-limit: ${FOREIGN_OWNERSHIP_PREDICTION_PRECOMPUTE_STOCK_LIMIT:5000}
    kis-realtime:
      enabled: true
      stock-codes: ${KIS_REALTIME_STOCK_CODES:005930,000660,005380,000270,086790,035420,068270,105560,055550,012330}
      index-codes: ${KIS_REALTIME_INDEX_CODES:0001,1001,2001}
      stock-limit: ${KIS_REALTIME_STOCK_LIMIT:5000}
      shard-size: ${KIS_REALTIME_SHARD_SIZE:40}
      order-book-enabled: true
      after-hours-enabled: true
    exchange-rate-refresh:
      enabled: true
      fixed-delay-ms: ${EXCHANGE_RATE_REFRESH_FIXED_DELAY_MS:300000}
      base-date-offset-days: ${EXCHANGE_RATE_REFRESH_BASE_DATE_OFFSET_DAYS:0}
      currencies: USD,JPY
    history-collection:
      enabled: true
      fixed-delay-ms: ${MARKET_HISTORY_COLLECTION_FIXED_DELAY_MS:86400000}
      base-date-offset-days: ${MARKET_HISTORY_COLLECTION_BASE_DATE_OFFSET_DAYS:1}
      provider: KIS_DAILY_CHART
  market-news:
    scheduler:
      enabled: true
      fixed-delay-ms: ${MARKET_NEWS_SCHEDULER_FIXED_DELAY_MS:300000}
      initial-delay-ms: ${MARKET_NEWS_SCHEDULER_INITIAL_DELAY_MS:60000}
      display: ${MARKET_NEWS_SCHEDULER_DISPLAY:5}
      queries: "${MARKET_NEWS_SCHEDULER_QUERIES:한국 증시,코스피,코스닥,국내 증시,외국인 순매수}"
  alert:
    dedupe:
      mode: redis
      ttl: ${ALERT_DEDUPE_TTL:24h}
      max-in-memory-entries: ${ALERT_DEDUPE_MAX_IN_MEMORY_ENTRIES:10000}
    scheduler:
      enabled: true
      fixed-delay-ms: ${ALERT_SCHEDULER_FIXED_DELAY_MS:300000}
      initial-delay-ms: ${ALERT_SCHEDULER_INITIAL_DELAY_MS:60000}
      news-display: ${ALERT_SCHEDULER_NEWS_DISPLAY:5}
      disclosure-lookback-days: ${ALERT_SCHEDULER_DISCLOSURE_LOOKBACK_DAYS:365}
      default-universe-enabled: ${ALERT_SCHEDULER_DEFAULT_UNIVERSE_ENABLED:true}
      default-universe-partner-id: ${ALERT_SCHEDULER_DEFAULT_UNIVERSE_PARTNER_ID:omnilens-default-universe}
      priority-stock-limit: ${ALERT_SCHEDULER_PRIORITY_STOCK_LIMIT:10}
      include-foreign-ownership-restricted-stocks: ${ALERT_SCHEDULER_INCLUDE_FOREIGN_OWNERSHIP_RESTRICTED_STOCKS:true}
      collection-batch-size: ${ALERT_SCHEDULER_COLLECTION_BATCH_SIZE:20}
      watchlists: []

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
