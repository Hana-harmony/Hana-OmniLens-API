server:
  port: ${SERVER_PORT:8080}

omnilens:
  security:
    api-key-enabled: true
    api-key-sha256: ${OMNILENS_API_KEY_SHA256}
    cors-allowed-origins: ${OMNILENS_CORS_ALLOWED_ORIGINS}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
