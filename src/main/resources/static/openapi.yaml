    Orderability:
      type: object
      required:
        - stockCode
        - market
        - side
        - quantity
        - orderable
        - foreignLimitExceeded
        - currentForeignLimitExhaustionRate
        - predictedForeignLimitExhaustionRate
        - foreignOwnershipPrediction
        - viActive
        - singlePriceTrading
        - priceLimitState
        - tradingHalted
        - checkedAt
        - source
      properties:
        stockCode:
          type: string
          pattern: "^\\d{6}$"
        market:
          type: string
          example: KOSPI
        side:
          type: string
          enum:
            - BUY
            - SELL
        quantity:
          type: integer
          format: int64
        orderable:
          type: boolean
        orderBlockedReason:
          type:
            - string
            - "null"
          description: Market-status block reason. Foreign ownership limit forecasts are warning-only and do not populate this field.
          example: TRADING_HALTED
        foreignLimitExceeded:
          type: boolean
          description: BUY warning flag for KRX foreign ownership restricted stocks only. It also covers zero-limit restricted stocks such as SBS/KNN/TBC. This does not block the order by itself.
        currentForeignLimitExhaustionRate:
          type: number
        predictedForeignLimitExhaustionRate:
          type: number
          description: Base forecast for today's foreign ownership limit exhaustion rate from the foreign ownership time series.
        foreignOwnershipPrediction:
          $ref: "#/components/schemas/ForeignOwnershipPrediction"
        foreignOwnershipBaseDate:
          type:
            - string
            - "null"
          format: date
        viActive:
          type: boolean
        singlePriceTrading:
          type: boolean
        priceLimitState:
          type: string
          enum:
            - NORMAL
            - UPPER_LIMIT
            - LOWER_LIMIT
        tradingHalted:
          type: boolean
        checkedAt:
          type: string
          format: date-time
        source:
          type: string
          description: Source chain used to compute the boundary, including KIS realtime status when price-limit state was derived from tick data.
    ForeignOwnershipPrediction:
      type: object
      required:
        - minForeignLimitExhaustionRate
        - baseForeignLimitExhaustionRate
        - maxForeignLimitExhaustionRate
        - orderImpactRate
        - intradayUncertaintyRate
        - observedIntradayVolume
        - trendDailyChangeRate
        - historyObservationCount
        - historyWindowDays
        - calculatedAt
        - confidenceLevel
        - confidenceScore
        - modelVersion
        - source
      properties:
        minForeignLimitExhaustionRate:
          type: number
          description: Lower bound of the predicted foreign ownership limit exhaustion rate.
        baseForeignLimitExhaustionRate:
          type: number
          description: Base forecast from the foreign ownership snapshot and daily time-series trend. Requested order quantity is not applied. For unrestricted stocks this is the current KRX snapshot rate.
        maxForeignLimitExhaustionRate:
          type: number
          description: Upper risk boundary for warning and display. It is evaluated for KRX foreign ownership restricted stocks, including zero-limit restricted stocks, and is not an automatic order-blocking condition.
        orderImpactRate:
          type: number
          description: Compatibility field. Foreign ownership limit prediction does not apply the requested mock order quantity and returns 0.
        intradayUncertaintyRate:
          type: number
          description: Compatibility field. KIS realtime accumulated volume is not applied; fallback responses may carry time-series or snapshot uncertainty under this legacy field name.
        observedIntradayVolume:
          type: integer
          format: int64
          description: Compatibility field. Foreign ownership limit prediction does not use intraday volume.
        trendDailyChangeRate:
          type: number
          description: Average daily percentage-point change from recent foreign ownership limit-exhaustion snapshots.
        historyObservationCount:
          type: integer
          format: int32
        historyWindowDays:
          type: integer
          format: int32
        baseDate:
          type:
            - string
            - "null"
          format: date
        calculatedAt:
          type: string
          format: date-time
        confidenceLevel:
          type: string
          enum:
            - TIME_SERIES_REALTIME_ADJUSTED
            - TIME_SERIES_ADJUSTED
            - LIMITED_TIME_SERIES
            - REALTIME_VOLUME_ADJUSTED
            - SNAPSHOT_ONLY
            - NO_SNAPSHOT
        confidenceScore:
          type: number
          minimum: 0
          maximum: 1
          description: Prediction confidence for observation and UI display only. It is not an automatic blocking decision.
        modelVersion:
          type: string
        source:
          type: string
          description: Data source chain used by the prediction engine.
    OrderBook:
      type: object
      required:
        - stockCode
        - asks
        - bids
        - marketDataTime
        - source
      properties:
        stockCode:
          type: string
          pattern: "^\\d{6}$"
        asks:
          type: array
          items:
            $ref: "#/components/schemas/OrderBookLevel"
        bids:
          type: array
          items:
            $ref: "#/components/schemas/OrderBookLevel"
        marketDataTime:
          type: string
          format: date-time
        source:
          type: string
          description: Data source, for example KIS_WEBSOCKET_ORDERBOOK or KIS_REST_ORDERBOOK.
    OrderBookLevel:
      type: object
      required:
        - priceKrw
        - quantity
      properties:
        priceKrw:
          type: number
        quantity:
          type: integer
          format: int64
    StockSummary:
      type: object
      required:
        - stockCode
        - stockName
        - stockNameEn
        - market
      properties:
        stockCode:
          type: string
          pattern: "^\\d{6}$"
        stockName:
          type: string
        stockNameEn:
          type: string
        market:
          type: string
        isinCode:
          type:
            - string
            - "null"
        dartCorpCode:
          type:
            - string
            - "null"
    AlertPublishRequest:
      type: object
      required:
        - partnerId
        - stockCode
        - stockName
        - sourceType
        - originalTitle
        - translatedTitle
        - summary
        - originalUrl
        - publishedAt
        - sentiment
        - importance
      properties:
        partnerId:
          type: string
          maxLength: 80
        stockCode:
          type: string
          pattern: "^\\d{6}$"
        stockName:
          type: string
          maxLength: 80
        sourceType:
          $ref: "#/components/schemas/SourceType"
        originalTitle:
          type: string
          maxLength: 300
        translatedTitle:
          type: string
          maxLength: 300
        summary:
          type: string
          maxLength: 1000
        originalUrl:
          type: string
          maxLength: 500
        publishedAt:
          type: string
          format: date-time
        eventTags:
          type: array
          items:
            type: string
        sentiment:
          $ref: "#/components/schemas/Sentiment"
        importance:
          $ref: "#/components/schemas/Importance"
        relatedStocks:
          type: array
          items:
            type: string
            pattern: "^\\d{6}$"
        holderTarget:
          type: boolean
        watchlistTarget:
          type: boolean
        glossaryTerms:
          type: array
          description: Financial glossary terms normalized by Hannah-Montana-AI for translation quality review.
          items:
            $ref: "#/components/schemas/AlertGlossaryTerm"
        translationQualityFlags:
          type: array
          description: Translation quality and review flags propagated from Hannah-Montana-AI.
          items:
            type: string
          example:
            - FINANCIAL_GLOSSARY_APPLIED
        translationProvider:
          type: string
          description: Active translation provider or source-language fallback marker.
          example: local-open-source-qwen3-translation
        translationModelVersion:
          type: string
          description: Translation model name used by the provider when available.
          example: local-llm:mlx-community/Qwen3-0.6B-4bit
        translationStatus:
          type: string
          enum:
            - TRANSLATED
            - PARTIAL_SOURCE_LANGUAGE_FALLBACK
            - SOURCE_LANGUAGE_FALLBACK
          description: Whether translated fields came from Hannah Qwen3 or were returned as source-language fallback.
        duplicateKey:
          type:
            - string
            - "null"
          maxLength: 128
          description: AI normalized duplicate key for downstream idempotency.
        modelVersion:
          type:
            - string
            - "null"
          maxLength: 120
          description: AI model version that produced this alert analysis.
        eventConfidence:
          type:
            - number
            - "null"
          minimum: 0
          maximum: 1
          description: Event tag confidence propagated from Hannah-Montana-AI for observation and UI display only. It is not an automatic blocking decision.
        sentimentConfidence:
          type:
            - number
            - "null"
          minimum: 0
          maximum: 1
          description: Sentiment confidence propagated from Hannah-Montana-AI for observation and UI display only. It is not an automatic blocking decision.
        importanceConfidence:
          type:
            - number
            - "null"
          minimum: 0
          maximum: 1
          description: Importance confidence propagated from Hannah-Montana-AI for observation and UI display only. It is not an automatic blocking decision.
        stockMatchConfidence:
          type:
            - number
            - "null"
          minimum: 0
          maximum: 1
          description: Stock mapping confidence propagated from Hannah-Montana-AI for observation and UI display only. It is not an automatic blocking decision.
    AlertGlossaryTerm:
      type: object
      required:
        - sourceTerm
        - normalizedTerm
        - englishTerm
        - category
      properties:
        sourceTerm:
          type: string
          example: 실적
        normalizedTerm:
          type: string
          example: 실적
        englishTerm:
          type: string
          example: earnings
        category:
          type: string
          example: event
        description:
          type: string
          example: Korean market slang combining Samsung Electronics and SK Hynix.
    AlertAnalysisPublishRequest:
      type: object
      required:
        - partnerId
        - sourceType
        - title
        - originalUrl
        - publishedAt
      properties:
        partnerId:
          type: string
          maxLength: 80
        sourceType:
          $ref: "#/components/schemas/SourceType"
        title:
          type: string
          maxLength: 300
        snippet:
          type: string
          maxLength: 1000
        originalUrl:
          type: string
          maxLength: 500
        publishedAt:
          type: string
          format: date-time
        stockUniverse:
          type: array
          items:
            $ref: "#/components/schemas/StockCandidate"
    StockCandidate:
      type: object
      required:
        - stockCode
        - stockName
        - stockNameEn
      properties:
        stockCode:
          type: string
          pattern: "^\\d{6}$"
        stockName:
          type: string
          maxLength: 80
        stockNameEn:
          type: string
          maxLength: 120
        aliases:
          type: array
          items:
            type: string
            maxLength: 80
    AlertCollectPublishRequest:
      type: object
      required:
        - partnerId
        - stockCodes
      properties:
        partnerId:
          type: string
          maxLength: 80
        stockCodes:
          type: array
          minItems: 1
          maxItems: 20
          items:
            type: string
            pattern: "^\\d{6}$"
        newsDisplay:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        disclosureLookbackDays:
          type: integer
          minimum: 1
          maximum: 30
          default: 7
    PartnerWatchlistUpdateRequest:
      type: object
      required:
        - stockCodes
      properties:
        stockCodes:
          type: array
          maxItems: 100
          items:
            type: string
            pattern: "^\\d{6}$"
    PartnerWatchlistResponse:
      type: object
      required:
        - partnerId
        - stockCodes
      properties:
        partnerId:
          type: string
          maxLength: 80
        stockCodes:
          type: array
          items:
            type: string
            pattern: "^\\d{6}$"
    PartnerCredentialRotationResult:
      type: object
      required:
        - partnerId
        - apiKey
        - apiKeySha256Prefix
        - rotatedAt
        - deactivatedCredentialCount
      properties:
        partnerId:
          type: string
          maxLength: 80
        apiKey:
          type: string
          minLength: 43
          maxLength: 43
          description: Newly generated raw API key. This value is returned once and is never stored in plain text.
        apiKeySha256Prefix:
          type: string
          minLength: 12
          maxLength: 12
          pattern: "^[a-f0-9]{12}$"
          description: First 12 hex characters of the stored SHA-256 hash for audit correlation.
        rotatedAt:
          type: string
          format: date-time
        deactivatedCredentialCount:
          type: integer
          minimum: 0
    AlertCollectPublishResponse:
      type: object
      required:
        - partnerId
        - requestedStockCodes
        - collectedNewsCount
        - collectedDisclosureCount
        - publishedCount
        - skippedDuplicateCount
        - failedAnalysisCount
        - events
      properties:
        partnerId:
          type: string
        requestedStockCodes:
          type: array
          items:
            type: string
        collectedNewsCount:
          type: integer
        collectedDisclosureCount:
          type: integer
        publishedCount:
          type: integer
        skippedDuplicateCount:
          type: integer
        failedAnalysisCount:
          type: integer
        events:
          type: array
          items:
            $ref: "#/components/schemas/AlertEvent"
    AlertEvent:
      allOf:
        - $ref: "#/components/schemas/AlertPublishRequest"
        - type: object
          required:
            - alertId
            - createdAt
          properties:
            alertId:
              type: string
            createdAt:
              type: string
              format: date-time
    SourceType:
      type: string
      enum:
        - NEWS
        - DISCLOSURE
    Sentiment:
      type: string
      enum:
        - POSITIVE
        - NEUTRAL
        - NEGATIVE
    Importance:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
        - CRITICAL
