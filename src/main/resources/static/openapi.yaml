openapi: 3.1.0
info:
  title: Hana OmniLens API
  version: 0.1.0-feature
  summary: B2B Korea market data and watchlist alert API
  description: >
    Hana OmniLens API provides Korea stock information, foreign ownership
    snapshots, and news/disclosure alert events for overseas exchange and broker
    partners. It does not provide order, execution, settlement, FX trading, or
    omnibus account processing. Every response includes
    X-HANA-OMNILENS-CORRELATION-ID for support and incident tracing.
servers:
  - url: https://api.hana-omnilens.example.com
    description: Production placeholder
  - url: http://localhost:8080
    description: Local development
security:
  - partnerMtls: []
    partnerApiKey: []
    partnerTimestamp: []
    partnerNonce: []
    partnerSignature: []
tags:
  - name: Market Data
    description: Korea stock quote, orderbook, and stock search APIs.
  - name: Alerts
    description: News and disclosure alert publish, analysis, and collection APIs.
  - name: Security
    description: Partner credential operation APIs.
  - name: Korean Financial Terms
    description: Korean market slang and financial term explanation APIs.
  - name: Tax OCR
    description: Tax document OCR verification APIs backed by Hannah-Montana-AI.
x-websocket:
  alertStream:
    endpoint: /ws/alerts
    protocol: STOMP
    subscribeTopics:
      partnerAlerts: /topic/partners/{partnerId}/alerts
      partnerStockAlerts: /topic/partners/{partnerId}/stocks/{stockCode}/alerts
      stockAlerts: /topic/stocks/{stockCode}/alerts
    authorization: >
      DB-bound partner credentials may subscribe only to their own partner topics.
      The global stock topic is retained for bootstrap/global-key compatibility.
    payloadSchema: AlertEvent
  marketQuoteStream:
    endpoint: /ws/market/quotes
    protocol: raw WebSocket JSON
    payloadSchema: MarketQuote
    replayRequest:
      type: QUOTE_STREAM_REPLAY
      currency: USD
      after: 2026-06-18T06:00:00Z
    description: >
      Authenticated partners receive one MarketQuote JSON message per KIS
      realtime trade tick. Sending QUOTE_STREAM_REPLAY replays the current
      quote snapshot in the requested local currency.
paths:
  /api/v1/tax/documents/verify:
    post:
      tags:
        - Tax OCR
      operationId: verifyTaxDocument
      summary: Verify a tax document through Hannah-Montana-AI OCR.
      description: >
        Sends tax document bytes to Hannah-Montana-AI for OCR, field extraction,
        and document rule review. Existing partner OCR text can be supplied as
        extractedText, but OmniLens does not fabricate OCR confidence or fraud
        scores. Document bytes are base64 encoded and never stored by OmniLens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaxDocumentVerificationRequest"
      responses:
        "200":
          description: Tax document verification result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxDocumentVerificationApiResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/market/stocks/{stockCode}:
    get:
      tags:
        - Market Data
      operationId: getStockMaster
      summary: Get one supported Korea stock master row.
      description: Returns the stock metadata used by quote, orderbook, and alert collection APIs.
      parameters:
        - $ref: "#/components/parameters/StockCode"
      responses:
        "200":
          description: Supported stock metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSummaryApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/StockNotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/market/stocks/{stockCode}/quote:
    get:
      tags:
        - Market Data
      operationId: getMarketQuote
      summary: Get a Korea stock quote with foreign ownership and local currency price.
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - name: currency
          in: query
          required: false
          schema:
            type: string
            pattern: "^[A-Z]{3}$"
            default: USD
          description: Local currency code shown to partner users.
        - name: fxRate
          in: query
          required: false
          schema:
            type: number
            minimum: 0.000001
          description: Partner-provided KRW to local currency conversion rate.
      responses:
        "200":
          description: Quote response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketQuoteApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PartnerAccessDenied"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/market/stocks/{stockCode}/detail:
    get:
      tags:
        - Market Data
      operationId: getStockDetail
      summary: Get Korea stock detail for exchange app screens.
      description: >
        Returns quote, local currency price, KRX foreign ownership snapshot,
        foreign limit prediction, and realtime order boundary flags in one
        payload for Stock-exchange-BE detail pages.
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - name: currency
          in: query
          required: false
          schema:
            type: string
            pattern: "^[A-Z]{3}$"
            default: USD
        - name: fxRate
          in: query
          required: false
          schema:
            type: number
            minimum: 0.000001
      responses:
        "200":
          description: Stock detail response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockDetailApiResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PartnerAccessDenied"
        "404":
          $ref: "#/components/responses/StockNotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/market/stocks/{stockCode}/global-peers:
    get:
      tags:
        - Market Data
      operationId: getGlobalPeers
      summary: Get validated global comparisons and key strengths for a Korea stock.
      description: >
        Returns the existing primaryPeer and peers contract together with one to
        three dimension-based comparisons and exactly four stock-specific key
        strengths. AI snake_case fields are validated against server allowlists
        before this endpoint emits the camelCase partner contract. An explicit
        OMNILENS_GLOBAL_PEER_FALLBACK response keeps comparisons and keyStrengths
        empty instead of fabricating unsupported cards.
      parameters:
        - $ref: "#/components/parameters/StockCode"
      responses:
        "200":
          description: Validated global peer comparison response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalPeerMatchApiResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/StockNotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/market/quotes:
    get:
      tags:
        - Market Data
      operationId: getMarketQuotes
      summary: Get all or requested Korea stock quotes with local currency prices.
      description: >
        If stockCodes are omitted, returns the stock master universe up to
        limit. If stockCodes are present, returns deduplicated requested quotes
        in request order. Each quote includes KRW price, local currency price,
        FX metadata, foreign ownership, and source metadata.
      parameters:
        - name: stockCodes
          in: query
          required: false
          schema:
            type: array
            maxItems: 200
            items:
              type: string
              pattern: "^\\d{6}$"
          style: form
          explode: true
        - name: market
          in: query
          required: false
          schema:
            type: string
            enum:
              - KOSPI
              - KOSDAQ
              - KONEX
        - name: currency
          in: query
          required: false
          schema:
            type: string
            pattern: "^[A-Z]{3}$"
            default: USD
        - name: fxRate
          in: query
          required: false
          schema:
            type: number
            minimum: 0.000001
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 2000
            default: 500
      responses:
        "200":
          description: Quote array response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketQuoteListApiResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PartnerAccessDenied"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/market/stocks/{stockCode}/orderability:
    get:
      tags:
        - Market Data
      operationId: getOrderability
      summary: Check partner mock-order boundary for a Korea stock.
      description: >
        Returns the market boundary that overseas exchange backends must check
        before writing their own mock ledger. Hana-OmniLens-API does not place
        a real order or call a KIS mock-trading order endpoint.
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - name: side
          in: query
          required: true
          schema:
            type: string
            enum:
              - BUY
              - SELL
        - name: quantity
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Orderability boundary response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderabilityApiResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PartnerAccessDenied"
        "404":
          $ref: "#/components/responses/StockNotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/market/stocks/{stockCode}/history:
    get:
      tags:
        - Market Data
      operationId: getMarketHistory
      summary: Get KRX-based Korea stock daily OHLCV history.
      description: >
        Returns normalized daily chart data saved by Hana-OmniLens-API from KRX
        Open API daily trade feeds. Overseas exchange backends use this REST
        snapshot for chart rendering and do not call KRX directly.
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 5000
            default: 365
      responses:
        "200":
          description: Daily OHLCV history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketDailyPriceListApiResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/StockNotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/market/history/collect:
    post:
      tags:
        - Market Data
      operationId: collectMarketHistory
      summary: Collect all Korean stock daily OHLCV history from KRX for one base date.
      description: >
        Operational endpoint used by scheduled jobs or administrators to collect
        KOSPI, KOSDAQ, and KONEX daily trade rows from KRX Open API and upsert
        them into Hana-OmniLens-API DB.
      parameters:
        - name: baseDate
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Collection result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketHistoryCollectionApiResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/market/foreign-ownership/collect:
    post:
      tags:
        - Market Data
      operationId: collectForeignOwnership
      summary: Collect KRX foreign ownership daily snapshots.
      description: >
        Operational endpoint used by scheduled jobs or administrators to collect
        KRX foreign ownership snapshots and upsert them into
        foreign_ownership_daily_snapshot for Hannah time-series prediction.
        Without explicit stockCodes, the default target is the current listed
        foreign ownership restricted stock allowlist.
      parameters:
        - name: baseDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: stockCodes
          in: query
          required: false
          schema:
            type: array
            maxItems: 500
            items:
              type: string
              pattern: "^\\d{6}$"
          style: form
          explode: true
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 2500
            default: 2500
        - name: requestDelayMs
          in: query
          required: false
          description: Delay between per-stock provider calls for KIS quota control.
          schema:
            type: integer
            format: int64
            minimum: 0
            maximum: 60000
            default: 0
      responses:
        "200":
          description: Foreign ownership collection result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForeignOwnershipCollectionApiResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/market/exchange-rates/{currency}:
    put:
      tags:
        - Market Data
      operationId: updateExchangeRate
      summary: Store a partner-provided KRW to local currency conversion rate.
      parameters:
        - name: currency
          in: path
          required: true
          schema:
            type: string
            pattern: "^[A-Z]{3}$"
          description: Local currency code used by partner users.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExchangeRateUpdateRequest"
      responses:
        "200":
          description: Stored exchange rate snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRateApiResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/market/stocks/{stockCode}/orderbook:
    get:
      tags:
        - Market Data
      operationId: getOrderBook
      summary: Get a Korea stock orderbook snapshot.
      parameters:
        - $ref: "#/components/parameters/StockCode"
      responses:
        "200":
          description: Orderbook response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderBookApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/market/stocks/search:
    get:
      tags:
        - Market Data
      operationId: searchStocks
      summary: Search supported Korea stocks by code, Korean name, or English name.
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 40
      responses:
        "200":
          description: Matching stocks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSummaryListApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/alerts/watchlists/{partnerId}:
    get:
      tags:
        - Alerts
      operationId: getPartnerWatchlist
      summary: Get a partner watchlist used by scheduled alert collection.
      parameters:
        - $ref: "#/components/parameters/PartnerId"
      responses:
        "200":
          description: Stored partner watchlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerWatchlistApiResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    put:
      tags:
        - Alerts
      operationId: replacePartnerWatchlist
      summary: Replace a partner watchlist used by scheduled alert collection.
      description: >
        Replaces the full list for one partner. Duplicate stock codes are
        removed while preserving request order. Empty lists clear the partner
        watchlist.
      parameters:
        - $ref: "#/components/parameters/PartnerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerWatchlistUpdateRequest"
      responses:
        "200":
          description: Stored partner watchlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerWatchlistApiResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PartnerAccessDenied"
        "404":
          $ref: "#/components/responses/StockNotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/alerts/events:
    post:
      tags:
        - Alerts
      operationId: publishAlertEvent
      summary: Publish an already analyzed alert event to partner and stock topics.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertPublishRequest"
      responses:
        "200":
          description: Published alert event.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertEventApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PartnerAccessDenied"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/alerts/analyze-and-publish:
    post:
      tags:
        - Alerts
      operationId: analyzeAndPublishAlert
      summary: Analyze one news or disclosure item with Hannah-Montana-AI and publish it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertAnalysisPublishRequest"
      responses:
        "200":
          description: Published alert event.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertEventApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PartnerAccessDenied"
        "422":
          description: Hannah-Montana-AI did not match the item to a supported stock.
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/alerts/collect-and-publish:
    post:
      tags:
        - Alerts
      operationId: collectAnalyzeAndPublishAlerts
      summary: Collect provider news and disclosures for stock codes, analyze them, and publish alerts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertCollectPublishRequest"
      responses:
        "200":
          description: Collection and publishing result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertCollectPublishApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PartnerAccessDenied"
        "404":
          description: None of the requested stock codes are supported.
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/security/partners/{partnerId}/credentials/rotate:
    post:
      tags:
        - Security
      operationId: rotatePartnerCredential
      summary: Rotate a partner API key using the bootstrap admin key.
      description: >
        Generates a new high-entropy partner API key, stores only its SHA-256
        hash, deactivates currently active keys for the partner, and returns the
        raw key exactly once in this response. DB-bound partner credentials are
        not allowed to call this operation.
      parameters:
        - $ref: "#/components/parameters/PartnerId"
      responses:
        "200":
          description: Partner credential rotated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerCredentialRotationApiResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PartnerAccessDenied"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/korean-financial-terms/explain:
    post:
      tags:
        - Korean Financial Terms
      operationId: explainKoreanFinancialTerm
      summary: Explain a clicked Korean financial term and record usage analytics.
      description: >
        Returns an English explanation for Korean market-specific financial
        slang or terminology from the Hannah-Montana-AI dictionary/RAG engine.
        Every request records anonymized click analytics so high-frequency terms
        can be cached and low-confidence new terms can be reviewed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KoreanFinancialTermExplainRequest"
      responses:
        "200":
          description: Korean financial term explanation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KoreanFinancialTermExplanationApiResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/korean-financial-terms/stats:
    get:
      tags:
        - Korean Financial Terms
      operationId: listKoreanFinancialTermStats
      summary: List clicked Korean financial term analytics.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
      responses:
        "200":
          description: Korean financial term click statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KoreanFinancialTermClickStatListApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
components:
  securitySchemes:
    partnerMtls:
      type: mutualTLS
      description: Partner client certificate used when mTLS is enabled in production.
    partnerApiKey:
      type: apiKey
      in: header
      name: X-HANA-OMNILENS-API-KEY
      description: Partner API key. The server stores only SHA-256 hashes and can bind keys to partner IDs.
    partnerTimestamp:
      type: apiKey
      in: header
      name: X-HANA-OMNILENS-TIMESTAMP
      description: ISO-8601 UTC timestamp used in HMAC request signing when signature verification is enabled.
    partnerNonce:
      type: apiKey
      in: header
      name: X-HANA-OMNILENS-NONCE
      description: Per-request nonce used to prevent replay when signature verification is enabled.
    partnerSignature:
      type: apiKey
      in: header
      name: X-HANA-OMNILENS-SIGNATURE
      description: Lowercase hex HMAC-SHA256 over method, URI with query, timestamp, nonce, and SHA-256 body hash.
  parameters:
    StockCode:
      name: stockCode
      in: path
      required: true
      schema:
        type: string
        pattern: "^\\d{6}$"
      description: Six digit Korea stock code.
    PartnerId:
      name: partnerId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 80
        pattern: "^[A-Za-z0-9._:-]+$"
      description: Partner identifier issued to an overseas exchange or broker.
  responses:
    Unauthorized:
      description: Missing or invalid partner API key.
    ValidationError:
      description: Request validation failed.
    StockNotFound:
      description: Supported stock master row was not found.
    PartnerAccessDenied:
      description: Authenticated partner cannot access another partner's alert resource.
    ServiceUnavailable:
      description: Server security or provider configuration is incomplete.
  schemas:
    TaxDocumentVerificationRequest:
      type: object
      required:
        - documentType
        - fileName
        - documentContentBase64
      properties:
        documentType:
          type: string
          enum:
            - RESIDENCE_CERTIFICATE
            - APOSTILLE
            - REDUCED_TAX_APPLICATION
            - TREATY_APPLICATION
            - PASSPORT
            - OTHER
        fileName:
          type: string
          minLength: 1
          maxLength: 255
        extractedText:
          type: string
          maxLength: 60000
        documentContentBase64:
          type: string
          maxLength: 14000000
          description: Base64 encoded document content passed to Hannah-Montana-AI.
        contentType:
          type: string
          maxLength: 120
          example: application/pdf
        ocrConfidence:
          type: number
          minimum: 0
          maximum: 1
          description: Optional upstream OCR confidence. Omit when sending raw document bytes.
        fraudSignalScore:
          type: number
          minimum: 0
          maximum: 1
          description: Optional upstream fraud signal. Omit when no fraud detector has run.
        expectedResidencyCountry:
          type: string
          minLength: 2
          maxLength: 2
        extractedFields:
          type: object
          additionalProperties:
            type: string
    TaxDocumentVerification:
      type: object
      required:
