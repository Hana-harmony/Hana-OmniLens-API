spring:
  application:
    name: hana-omnilens-api
  profiles:
    default: local

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

omnilens:
  security:
    api-key-enabled: true
    api-key-sha256: ""
    cors-allowed-origins: []
    rate-limit:
      enabled: true
      capacity: 120
      refill-tokens: 120
      refill-period: 1m
      max-buckets: 10000
  providers:
    public-data:
      stock-securities-base-url: https://apis.data.go.kr/1160100/service/GetStockSecuritiesInfoService
      service-key: ""
    naver-news:
      base-url: https://openapi.naver.com
      client-id: ""
      client-secret: ""
    open-dart:
      base-url: https://opendart.fss.or.kr
      api-key: ""
    krx:
      base-url: https://data.krx.co.kr
  ai:
    hannah:
      base-url: http://hannah-montana-ai:8000
  alert:
    dedupe:
      mode: redis
      ttl: 24h
      max-in-memory-entries: 10000
    scheduler:
      enabled: false
      fixed-delay-ms: 300000
      news-display: 10
      disclosure-lookback-days: 7
      watchlists: []
