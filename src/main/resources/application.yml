spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  task:
    scheduling:
      pool:
        size: 4
      thread-name-prefix: omni-connect-scheduler-
      shutdown:
        await-termination: true
        await-termination-period: 30s
  application:
    name: hana-omni-connect-api
  profiles:
    default: local

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

omni-connect:
  observability:
    discord:
      webhook-url: ${OMNI_CONNECT_DISCORD_WEBHOOK_URL:}
  security:
    cors-allowed-origins: []
    rate-limit:
      enabled: true
      max-requests: 120
      window: 1m
    signature:
      enabled: true
      allowed-clock-skew: 2m
      nonce-store-mode: redis
      max-nonces: 10000
  portal:
    session-signing-key: ${OMNI_CONNECT_PORTAL_SESSION_SIGNING_KEY:}
    api-key-encryption-key: ${OMNI_CONNECT_PORTAL_API_KEY_ENCRYPTION_KEY:}
    bootstrap-admin-password: ${OMNI_CONNECT_PORTAL_BOOTSTRAP_ADMIN_PASSWORD:}
  providers:
    public-data:
      stock-securities-base-url: https://apis.data.go.kr/1160100/service/GetStockSecuritiesInfoService
      service-key: ""
    naver-news:
      base-url: https://openapi.naver.com
      client-id: ""
      client-secret: ""
    open-dart:
      base-url: https://opendart.fss.or.kr
      api-key: ""
    krx:
      base-url: https://data.krx.co.kr
      scraping-enabled: true
      id: ""
      password: ""
      login-path: /contents/MDC/COMS/client/MDCCOMS001D1.cmd
      foreign-ownership-history-bld: dbms/MDC/STAT/standard/MDCSTAT03702
    krx-open-api:
      base-url: https://data-dbg.krx.co.kr
      auth-key: ""
    kis:
      base-url: https://openapi.koreainvestment.com:9443
      websocket-url: ws://ops.koreainvestment.com:21000
      account-number: ""
      app-key: ""
      app-secret: ""
      access-token: ""
      approval-key: ""
    real-kis:
      base-url: https://openapi.koreainvestment.com:9443
      websocket-url: ws://ops.koreainvestment.com:21000
      account-number: ""
      app-key: ""
      app-secret: ""
      access-token: ""
      approval-key: ""
    frankfurter:
      base-url: https://api.frankfurter.dev
    resilience:
      connect-timeout: 2s
      read-timeout: 5s
      retry:
        enabled: true
        max-attempts: 2
        backoff: 150ms
      circuit-breaker:
        enabled: true
        failure-threshold: 5
        open-duration: 30s
  ai:
    hannah:
      base-url: http://hannah-montana-ai:8000
      connect-timeout: 2s
      read-timeout: 30m
  term:
    analytics:
      hash-salt: ${OMNI_CONNECT_TERM_ANALYTICS_HASH_SALT:local-term-analytics-salt}
  market:
    stock-master:
      seed:
        enabled: true
        location: classpath:data/stock-master-seed.csv
        kis-master-sync-enabled: true
    exchange-rate-cache:
      mode: redis
      ttl: 24h
    foreign-ownership-cache:
      mode: redis
      ttl: 24h
    foreign-ownership-refresh:
      enabled: true
      fixed-delay-ms: 86400000
      initial-delay-ms: 60000
      cron: "0 10 8,16 * * MON-FRI"
      request-delay-ms: 1200
      base-date-offset-days: 1
      backfill-lookback-days: 400
      stock-limit: 5000
      stock-codes: []
    foreign-ownership-model-training:
      enabled: true
      trigger-after-refresh: true
      connect-timeout: 2s
      read-timeout: 20m
      maintenance-token: ${HANNAH_AI_MAINTENANCE_TOKEN:}
      minimum-promotable-stock-count: 29
      minimum-promotable-history-days: 2500
      minimum-promotable-observations: 50000
      max-model-training-samples: 250000
    foreign-ownership-prediction-precompute:
      enabled: true
      trigger-after-refresh: true
      stock-limit: 5000
    kis-realtime:
      enabled: true
      stock-codes:
        - "005930"
        - "000660"
        - "005380"
        - "000270"
        - "086790"
        - "035420"
        - "068270"
        - "105560"
        - "055550"
        - "012330"
      index-codes:
        - "0001"
        - "1001"
        - "2001"
      stock-limit: 5000
      shard-size: 40
      order-book-enabled: true
      after-hours-enabled: true
    exchange-rate-refresh:
      enabled: true
      fixed-delay-ms: 300000
      base-date-offset-days: 0
      currencies:
        - "USD"
        - "JPY"
    history-collection:
      enabled: true
      fixed-delay-ms: 86400000
      base-date-offset-days: 1
      provider: KIS_DAILY_CHART
    chart-warmup:
      enabled: true
      fixed-delay-ms: 300000
      initial-delay-ms: 10000
      base-date-offset-days: 0
      daily-lookback-days: 30
      intraday-lookback-days: 7
      stock-limit: 30
      stock-codes: []
      request-delay-ms: 1200
      daily-enabled: true
      intraday-enabled: true
  market-news:
    scheduler:
      enabled: true
      fixed-delay-ms: 300000
      initial-delay-ms: 60000
      display: 5
      queries:
        - "한국 증시"
        - "코스피"
        - "코스닥"
        - "국내 증시"
        - "외국인 순매수"
  alert:
    dedupe:
      mode: redis
      ttl: 24h
      max-in-memory-entries: 10000
    scheduler:
      enabled: true
      fixed-delay-ms: 300000
      initial-delay-ms: 60000
      news-display: 5
      disclosure-lookback-days: 365
      default-universe-enabled: true
      default-universe-partner-id: omni-connect-default-universe
      priority-stock-limit: 10
      include-foreign-ownership-restricted-stocks: true
      collection-batch-size: 20
      watchlists: []
