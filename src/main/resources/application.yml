spring:
  application:
    name: hana-omnilens-api
  profiles:
    default: local

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

omnilens:
  security:
    api-key-enabled: true
    api-key-sha256: ""
    cors-allowed-origins: []
    rate-limit:
      enabled: true
      capacity: 120
      refill-tokens: 120
      refill-period: 1m
      max-buckets: 10000
    signature:
      enabled: false
      secret: ""
      allowed-clock-skew: 5m
      nonce-store-mode: redis
      max-nonces: 10000
    mtls:
      enabled: false
  providers:
    public-data:
      stock-securities-base-url: https://apis.data.go.kr/1160100/service/GetStockSecuritiesInfoService
      service-key: ""
    naver-news:
      base-url: https://openapi.naver.com
      client-id: ""
      client-secret: ""
    deep-l-translation:
      base-url: https://api-free.deepl.com
      api-key: ""
    open-dart:
      base-url: https://opendart.fss.or.kr
      api-key: ""
    krx-open-api:
      base-url: https://data-dbg.krx.co.kr
      auth-key: ""
    kis:
      base-url: https://openapi.koreainvestment.com:9443
      websocket-url: ws://ops.koreainvestment.com:21000
      account-number: ""
      app-key: ""
      app-secret: ""
      access-token: ""
      approval-key: ""
    frankfurter:
      base-url: https://api.frankfurter.dev
    resilience:
      connect-timeout: 2s
      read-timeout: 5s
      retry:
        enabled: true
        max-attempts: 2
        backoff: 150ms
      circuit-breaker:
        enabled: true
        failure-threshold: 5
        open-duration: 30s
  ai:
    hannah:
      base-url: http://hannah-montana-ai:8000
  market:
    stock-master:
      seed:
        enabled: true
        location: classpath:data/stock-master-seed.csv
        kis-master-sync-enabled: true
    exchange-rate-cache:
      mode: redis
      ttl: 24h
    foreign-ownership-cache:
      mode: redis
      ttl: 24h
    foreign-ownership-refresh:
      enabled: false
      fixed-delay-ms: 86400000
      initial-delay-ms: 60000
      request-delay-ms: 1200
      base-date-offset-days: 1
      stock-limit: 2500
      stock-codes: []
    kis-realtime:
      enabled: false
      stock-codes: []
      index-codes: []
      stock-limit: 5000
      shard-size: 40
      order-book-enabled: false
      after-hours-enabled: false
    exchange-rate-refresh:
      enabled: false
      fixed-delay-ms: 300000
      base-date-offset-days: 0
      currencies: []
    history-collection:
      enabled: false
      fixed-delay-ms: 86400000
      base-date-offset-days: 1
      provider: KRX_OPEN_API_WITH_KIS_BACKUP
  alert:
    dedupe:
      mode: redis
      ttl: 24h
      max-in-memory-entries: 10000
    scheduler:
      enabled: false
      fixed-delay-ms: 300000
      news-display: 10
      disclosure-lookback-days: 7
      watchlists: []
