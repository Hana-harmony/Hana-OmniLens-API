spring:
  application:
    name: hana-omnilens-api
  profiles:
    default: local

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

omnilens:
  security:
    api-key-enabled: true
    api-key-sha256: ""
    cors-allowed-origins: []
  providers:
    public-data:
      stock-securities-base-url: https://apis.data.go.kr/1160100/service/GetStockSecuritiesInfoService
      service-key: ""
    naver-news:
      base-url: https://openapi.naver.com
      client-id: ""
      client-secret: ""
    open-dart:
      base-url: https://opendart.fss.or.kr
      api-key: ""
  ai:
    hannah:
      base-url: http://hannah-montana-ai:8000
