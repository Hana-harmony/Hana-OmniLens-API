server:
  port: 8080

omnilens:
  security:
    api-key-enabled: false
    api-key-sha256: ""
    cors-allowed-origins:
      - http://localhost:3000
      - http://localhost:5173

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/omnilens
    username: omnilens
    password: omnilens-local-password
  data:
    redis:
      host: localhost
      port: 6379
