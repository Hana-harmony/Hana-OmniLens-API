server:
  port: 8080

omni-connect:
  security:
    cors-allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
    rate-limit:
      enabled: true
      max-requests: 120
      window: 1m
    signature:
      enabled: true
      allowed-clock-skew: 2m
      nonce-store-mode: redis
      max-nonces: 10000
  portal:
    session-signing-key: ${OMNI_CONNECT_PORTAL_SESSION_SIGNING_KEY}
    api-key-encryption-key: ${OMNI_CONNECT_PORTAL_API_KEY_ENCRYPTION_KEY}
  providers:
    public-data:
      stock-securities-base-url: https://apis.data.go.kr/1160100/service/GetStockSecuritiesInfoService
      service-key: "replace-with-public-data-service-key"
    naver-news:
      base-url: https://openapi.naver.com
      client-id: "replace-with-naver-news-client-id"
      client-secret: "replace-with-naver-news-client-secret"
      query-cache-ttl: 10m
      query-cache-max-entries: 1024
      daily-request-limit: 25000
      daily-request-reserve: 5000
    open-dart:
      base-url: https://opendart.fss.or.kr
      api-key: "replace-with-open-dart-api-key"
    krx:
      base-url: https://data.krx.co.kr
      scraping-enabled: true
      id: ${KRX_ID:}
      password: ${KRX_PW:}
      login-path: /contents/MDC/COMS/client/MDCCOMS001D1.cmd
      foreign-ownership-history-bld: dbms/MDC/STAT/standard/MDCSTAT03702
    krx-open-api:
      base-url: https://data-dbg.krx.co.kr
      auth-key: "replace-with-krx-open-api-auth-key"
    kis:
      base-url: https://openapivts.koreainvestment.com:29443
      websocket-url: ws://ops.koreainvestment.com:31000
      account-number: "replace-with-kis-account-number"
      app-key: "replace-with-kis-app-key"
      app-secret: "replace-with-kis-app-secret"
      access-token: ""
      approval-key: ""
    real-kis:
      base-url: https://openapi.koreainvestment.com:9443
      websocket-url: ws://ops.koreainvestment.com:21000
      account-number: "replace-with-real-kis-account-number"
      app-key: "replace-with-real-kis-app-key"
      app-secret: "replace-with-real-kis-app-secret"
      access-token: ""
      approval-key: ""
    frankfurter:
      base-url: https://api.frankfurter.dev
    resilience:
      connect-timeout: 2s
      read-timeout: 5s
      retry:
        enabled: true
        max-attempts: 2
        backoff: 150ms
      circuit-breaker:
        enabled: true
        failure-threshold: 5
        open-duration: 30s
  ai:
    hannah:
      base-url: http://localhost:8000
      connect-timeout: 2s
      read-timeout: 30m
      tax-read-timeout: 90s
      maintenance-token: ${HANNAH_AI_MAINTENANCE_TOKEN:}
      initial-backfill-enabled: false
      initial-backfill-target-per-source: 5
  market:
    stock-master:
      seed:
        enabled: true
        location: classpath:data/stock-master-seed.csv
        kis-master-sync-enabled: true
    exchange-rate-cache:
      mode: redis
      ttl: 24h
    foreign-ownership-cache:
      mode: redis
      ttl: 24h
    foreign-ownership-refresh:
      enabled: true
      cron: "0 10 8,16 * * MON-FRI"
      request-delay-ms: 1200
      base-date-offset-days: 1
      backfill-lookback-days: 400
      stock-limit: 5000
      stock-codes: []
    foreign-ownership-model-training:
      enabled: true
      trigger-after-refresh: true
      connect-timeout: 2s
      read-timeout: 20m
      maintenance-token: ${HANNAH_AI_MAINTENANCE_TOKEN:}
      minimum-promotable-stock-count: 29
      minimum-promotable-history-days: 2500
      minimum-promotable-observations: 50000
      max-model-training-samples: 250000
    foreign-ownership-prediction-precompute:
      enabled: true
      trigger-after-refresh: true
      stock-limit: 5000
    kis-realtime:
      enabled: true
      stock-codes:
        - "005930"
        - "000660"
        - "005380"
        - "000270"
        - "086790"
        - "035420"
        - "068270"
        - "105560"
        - "055550"
        - "012330"
      index-codes:
        - "0001"
        - "1001"
        - "2001"
      stock-limit: 20
      shard-size: 40
      order-book-enabled: true
      after-hours-enabled: true
    exchange-rate-refresh:
      enabled: true
      fixed-delay-ms: 300000
      base-date-offset-days: 0
      currencies:
        - "USD"
        - "JPY"
    history-collection:
      enabled: true
      fixed-delay-ms: 86400000
      base-date-offset-days: 1
      provider: KIS_DAILY_CHART
  market-news:
    scheduler:
      enabled: true
      fixed-delay-ms: 600000
      initial-delay-ms: 60000
      display: 5
      queries:
        - "한국 증시"
        - "코스피"
        - "코스닥"
        - "국내 증시"
        - "외국인 순매수"
  alert:
    dedupe:
      mode: redis
      ttl: 24h
      max-in-memory-entries: 10000
    scheduler:
      enabled: true
      fixed-delay-ms: 600000
      initial-delay-ms: 60000
      news-display: 5
      disclosure-lookback-days: 365
      default-universe-enabled: true
      default-universe-partner-id: omni-connect-default-universe
      priority-stock-limit: 10
      include-foreign-ownership-restricted-stocks: true
      collection-batch-size: 1
      watchlists:
        - partner-id: partner-local
          stock-codes:
            - "005930"
            - "000660"

providers:
  kis:
    base-url: https://openapivts.koreainvestment.com:29443
    websocket-url: ws://ops.koreainvestment.com:31000
    account-number: ""
    app-key: ""
    app-secret: ""

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/omni-connect
    username: omni-connect
    password: omni-connect-local-password
  data:
    redis:
      host: localhost
      port: 6379
