server:
  port: 8080

omnilens:
  security:
    api-key-enabled: false
    api-key-sha256: ""
    cors-allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
    rate-limit:
      enabled: false
      capacity: 120
      refill-tokens: 120
      refill-period: 1m
      max-buckets: 10000
    signature:
      enabled: false
      secret: "replace-with-local-hmac-secret"
      allowed-clock-skew: 5m
      nonce-store-mode: in-memory
      max-nonces: 10000
    mtls:
      enabled: false
  providers:
    public-data:
      stock-securities-base-url: https://apis.data.go.kr/1160100/service/GetStockSecuritiesInfoService
      service-key: "replace-with-public-data-service-key"
    naver-news:
      base-url: https://openapi.naver.com
      client-id: "replace-with-naver-news-client-id"
      client-secret: "replace-with-naver-news-client-secret"
    papago-translation:
      base-url: https://openapi.naver.com
      client-id: "replace-with-papago-translation-client-id"
      client-secret: "replace-with-papago-translation-client-secret"
    deep-l-translation:
      base-url: https://api-free.deepl.com
      api-key: "replace-with-deepl-api-key"
    open-dart:
      base-url: https://opendart.fss.or.kr
      api-key: "replace-with-open-dart-api-key"
    krx-open-api:
      base-url: https://data-dbg.krx.co.kr
      auth-key: "replace-with-krx-open-api-auth-key"
    kis:
      base-url: https://openapivts.koreainvestment.com:29443
      websocket-url: ws://ops.koreainvestment.com:31000
      app-key: "replace-with-kis-app-key"
      app-secret: "replace-with-kis-app-secret"
      access-token: ""
      approval-key: ""
    frankfurter:
      base-url: https://api.frankfurter.dev
    resilience:
      connect-timeout: 2s
      read-timeout: 5s
      retry:
        enabled: true
        max-attempts: 2
        backoff: 150ms
      circuit-breaker:
        enabled: true
        failure-threshold: 5
        open-duration: 30s
  ai:
    hannah:
      base-url: http://localhost:8000
  market:
    stock-master:
      seed:
        enabled: true
        location: classpath:data/stock-master-seed.csv
    exchange-rate-cache:
      mode: redis
      ttl: 24h
    foreign-ownership-cache:
      mode: redis
      ttl: 24h
    kis-realtime:
      enabled: false
      stock-codes:
        - "005930"
        - "000660"
    exchange-rate-refresh:
      enabled: false
      fixed-delay-ms: 300000
      base-date-offset-days: 0
      currencies:
        - "USD"
        - "JPY"
    history-collection:
      enabled: false
      fixed-delay-ms: 86400000
      base-date-offset-days: 1
  alert:
    dedupe:
      mode: redis
      ttl: 24h
      max-in-memory-entries: 10000
    scheduler:
      enabled: false
      fixed-delay-ms: 300000
      news-display: 10
      disclosure-lookback-days: 7
      watchlists:
        - partner-id: partner-local
          stock-codes:
            - "005930"
            - "000660"

providers:
  kis:
    base-url: https://openapi.koreainvestment.com:9443
    account-number: ""
    app-key: ""
    app-secret: ""

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/omnilens
    username: omnilens
    password: omnilens-local-password
  data:
    redis:
      host: localhost
      port: 6379
