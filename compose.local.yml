services:
  api:
    platform: linux/arm64
    build:
      context: .
    container_name: hana-omnilens-api
    cpus: "1.40"
    mem_limit: 4g
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70 -XX:+ExitOnOutOfMemoryError"
      SPRING_PROFILES_ACTIVE: local
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:/app/config/application-local.yml
      OMNILENS_SECURITY_API_KEY_ENABLED: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/omnilens
      SPRING_DATASOURCE_USERNAME: omnilens
      SPRING_DATASOURCE_PASSWORD: omnilens-local-password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      OMNILENS_AI_HANNAH_BASE_URL: http://host.docker.internal:8000
      OMNILENS_AI_HANNAH_READ_TIMEOUT: 30m
      OMNILENS_TERM_ANALYTICS_HASH_SALT: ${OMNILENS_TERM_ANALYTICS_HASH_SALT:-local-term-analytics-salt}
      OMNILENS_PROVIDERS_KIS_BASE_URL: ${OMNILENS_PROVIDERS_KIS_BASE_URL:-https://openapivts.koreainvestment.com:29443}
      OMNILENS_PROVIDERS_KIS_WEBSOCKET_URL: ${OMNILENS_PROVIDERS_KIS_WEBSOCKET_URL:-ws://ops.koreainvestment.com:31000}
      OMNILENS_PROVIDERS_REAL_KIS_BASE_URL: ${OMNILENS_PROVIDERS_REAL_KIS_BASE_URL:-https://openapi.koreainvestment.com:9443}
      OMNILENS_PROVIDERS_REAL_KIS_WEBSOCKET_URL: ${OMNILENS_PROVIDERS_REAL_KIS_WEBSOCKET_URL:-ws://ops.koreainvestment.com:21000}
      KRX_SCRAPING_ENABLED: ${KRX_SCRAPING_ENABLED:-true}
      KRX_ID: ${KRX_ID:-}
      KRX_PW: ${KRX_PW:-}
      OMNILENS_MARKET_EXCHANGE_RATE_REFRESH_ENABLED: "true"
      OMNILENS_MARKET_EXCHANGE_RATE_REFRESH_FIXED_DELAY_MS: "300000"
      OMNILENS_MARKET_EXCHANGE_RATE_REFRESH_CURRENCIES: USD
      OMNILENS_MARKET_FOREIGN_OWNERSHIP_REFRESH_ENABLED: "true"
      OMNILENS_MARKET_FOREIGN_OWNERSHIP_REFRESH_FIXED_DELAY_MS: "86400000"
      OMNILENS_MARKET_FOREIGN_OWNERSHIP_REFRESH_INITIAL_DELAY_MS: "60000"
      OMNILENS_MARKET_FOREIGN_OWNERSHIP_REFRESH_REQUEST_DELAY_MS: "1200"
      OMNILENS_MARKET_FOREIGN_OWNERSHIP_REFRESH_STOCK_LIMIT: "20"
      OMNILENS_MARKET_KIS_REALTIME_ENABLED: "true"
      OMNILENS_MARKET_KIS_REALTIME_STOCK_CODES: "005930,000660,005380,000270,086790,035420,068270,105560,055550,012330"
      OMNILENS_MARKET_KIS_REALTIME_INDEX_CODES: "0001,1001,2001"
      OMNILENS_MARKET_KIS_REALTIME_STOCK_LIMIT: "20"
      OMNILENS_MARKET_KIS_REALTIME_SHARD_SIZE: "40"
      OMNILENS_MARKET_KIS_REALTIME_ORDER_BOOK_ENABLED: "true"
      OMNILENS_MARKET_KIS_REALTIME_AFTER_HOURS_ENABLED: "true"
      OMNILENS_MARKET_HISTORY_COLLECTION_ENABLED: "false"
      OMNILENS_MARKET_HISTORY_COLLECTION_PROVIDER: KIS_DAILY_CHART
      OMNILENS_MARKET_NEWS_SCHEDULER_ENABLED: "true"
      OMNILENS_MARKET_NEWS_SCHEDULER_INITIAL_DELAY_MS: "3600000"
      OMNILENS_MARKET_NEWS_SCHEDULER_DISPLAY: "5"
      OMNILENS_MARKET_NEWS_SCHEDULER_QUERIES: "한국 증시,코스피,코스닥,국내 증시,외국인 순매수"
      OMNILENS_ALERT_SCHEDULER_ENABLED: "true"
      OMNILENS_ALERT_SCHEDULER_INITIAL_DELAY_MS: "3600000"
      OMNILENS_ALERT_SCHEDULER_NEWS_DISPLAY: "5"
      OMNILENS_ALERT_SCHEDULER_DISCLOSURE_LOOKBACK_DAYS: "365"
      OMNILENS_ALERT_SCHEDULER_DEFAULT_UNIVERSE_ENABLED: "true"
      OMNILENS_ALERT_SCHEDULER_DEFAULT_UNIVERSE_PARTNER_ID: omnilens-default-universe
      OMNILENS_ALERT_SCHEDULER_PRIORITY_STOCK_LIMIT: "10"
      OMNILENS_ALERT_SCHEDULER_INCLUDE_FOREIGN_OWNERSHIP_RESTRICTED_STOCKS: "true"
      OMNILENS_ALERT_SCHEDULER_COLLECTION_BATCH_SIZE: "20"
    volumes:
      - ./src/main/resources/application-local.yml:/app/config/application-local.yml:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 3s
      retries: 20

  postgres:
    platform: linux/arm64
    image: postgres:17-alpine
    container_name: hana-omnilens-postgres
    cpus: "0.60"
    mem_limit: 3g
    environment:
      POSTGRES_DB: omnilens
      POSTGRES_USER: omnilens
      POSTGRES_PASSWORD: omnilens-local-password
    ports:
      - "5432:5432"
    volumes:
      - hana-omnilens-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnilens -d omnilens"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    platform: linux/arm64
    image: redis:8-alpine
    container_name: hana-omnilens-redis
    cpus: "0.20"
    mem_limit: 512m
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - hana-omnilens-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  hana-omnilens-postgres-data:
  hana-omnilens-redis-data:
