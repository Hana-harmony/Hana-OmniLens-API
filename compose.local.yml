services:
  postgres:
    image: postgres:17-alpine
    container_name: hana-omnilens-postgres
    environment:
      POSTGRES_DB: omnilens
      POSTGRES_USER: omnilens
      POSTGRES_PASSWORD: omnilens-local-password
    ports:
      - "5432:5432"
    volumes:
      - hana-omnilens-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnilens -d omnilens"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: hana-omnilens-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - hana-omnilens-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  hana-omnilens-postgres-data:
  hana-omnilens-redis-data:
