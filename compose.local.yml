services:
  api:
    platform: linux/arm64
    build:
      context: .
    container_name: hana-omnilens-api
    cpus: "1.40"
    mem_limit: 4g
    env_file:
      - .env.local
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70 -XX:+ExitOnOutOfMemoryError"
      SPRING_PROFILES_ACTIVE: local
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:/app/config/application-local.yml
      SPRING_DATASOURCE_URL: jdbc:postgresql://hana-omnilens-postgres:5432/omnilens
      SPRING_DATASOURCE_USERNAME: omnilens
      SPRING_DATASOURCE_PASSWORD: omnilens-local-password
      SPRING_DATA_REDIS_HOST: hana-omnilens-redis
      SPRING_DATA_REDIS_PORT: "6379"
      OMNILENS_AI_HANNAH_BASE_URL: http://hannah-montana-ai:8000
      OMNILENS_AI_HANNAH_READ_TIMEOUT: 30m
    volumes:
      - ./src/main/resources/application-local.yml:/app/config/application-local.yml:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 3s
      retries: 20

  postgres:
    platform: linux/arm64
    image: postgres:17-alpine
    container_name: hana-omnilens-postgres
    cpus: "0.60"
    mem_limit: 3g
    environment:
      POSTGRES_DB: omnilens
      POSTGRES_USER: omnilens
      POSTGRES_PASSWORD: omnilens-local-password
    ports:
      - "5432:5432"
    volumes:
      - hana-omnilens-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnilens -d omnilens"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  redis:
    platform: linux/arm64
    image: redis:8-alpine
    container_name: hana-omnilens-redis
    cpus: "0.20"
    mem_limit: 512m
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - hana-omnilens-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

volumes:
  hana-omnilens-postgres-data:
  hana-omnilens-redis-data:

networks:
  internal:
    name: hana-omnilens-internal
    external: true
